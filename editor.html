<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Editor — City Metro Transit</title>
<link rel="stylesheet" href="style.css">
<style>
body,html{{height:100%;overflow:hidden;}}
.hint-bar{{
  position:fixed;top:calc(var(--nav-h));left:0;right:0;z-index:1700;
  background:rgba(17,24,39,.92);color:white;padding:.5rem 1rem;
  font-size:.8rem;font-weight:600;text-align:center;
  display:none;
}}
.hint-bar.show{{display:block;}}
</style>
</head>
<body>
{nav_login}

<div class="hint-bar" id="hintBar"></div>

<div class="canvas-wrap" id="canvasWrap">
  <canvas id="canvas"></canvas>
</div>

<!-- LEFT TOOLBAR -->
<div class="ed-toolbar">
  <button class="ed-btn active" id="btnSelect" onclick="setTool('select')" title="Select / Pan">✋</button>
  <button class="ed-btn" id="btnStreet" onclick="setTool('street')" title="Draw street (cosmetic)">🛣</button>
  <button class="ed-btn" id="btnLine" onclick="setTool('line')" title="Draw transit line">✏️</button>
  <button class="ed-btn" id="btnStation" onclick="setTool('station')" title="Place station/stop">📍</button>
  <button class="ed-btn" id="btnVehicle" onclick="setTool('vehicle')" title="Place live vehicle">🚌</button>
  <div style="height:8px"></div>
  <button class="ed-btn" onclick="openPanel('lines')" title="Manage lines">☰</button>
  <button class="ed-btn" onclick="openPanel('stations')" title="Manage stations">🗂</button>
  <button class="ed-btn" onclick="openPanel('vehicles')" title="Live vehicles">🔴</button>
</div>

<!-- ZOOM CONTROLS -->
<div class="canvas-ctrls with-toolbar">
  <button class="zoom-btn" onclick="engine.zoomBy(1.25)">+</button>
  <button class="zoom-btn" onclick="engine.zoomBy(0.8)">−</button>
  <button class="zoom-btn" onclick="fitAll()" title="Fit all">⤢</button>
  <div class="zoom-pct" id="zoomPct">100%</div>
</div>

<!-- RIGHT PANEL -->
<div class="ed-panel" id="edPanel">

  <!-- LINES TAB -->
  <div id="panelLines">
    <div class="ed-head"><span>Lines</span><button onclick="closePanel()" style="margin-left:auto;background:none;border:none;font-size:1.1rem;cursor:pointer">✕</button></div>

    <div class="ed-sec">
      <div class="ed-lbl">Create / edit line</div>
      <div class="ed-row">
        <input class="ed-input" id="lineId" placeholder="ID (A, 38…)" style="width:80px">
        <input class="ed-input" id="lineName" placeholder="Full name" style="flex:1">
      </div>
      <div class="ed-row" style="margin-top:.4rem">
        <select class="ed-input" id="lineType" style="flex:1">
          <option value="rail">Rail</option>
          <option value="bus">Bus</option>
        </select>
        <input type="color" class="ed-clr" id="lineColor" value="#2563EB" title="Line color">
        <input type="color" class="ed-clr" id="lineTextColor" value="#FFFFFF" title="Text color">
      </div>
      <input class="ed-input" id="lineFreq" placeholder="Frequency (e.g. Every 10 min)" style="margin-top:.4rem">
      <div class="chk-row"><input type="checkbox" id="lineLoop"><label for="lineLoop">Loop line</label></div>
      <button class="ed-action" onclick="saveLine()">Save line</button>
    </div>

    <div class="ed-sec">
      <div class="ed-lbl">Route direction being edited</div>
      <select class="ed-input" id="lineDirection">
        <option value="outbound">Outbound</option>
        <option value="inbound">Inbound</option>
        <option value="both">Both (loop)</option>
        <option value="northbound">Northbound</option>
        <option value="southbound">Southbound</option>
        <option value="eastbound">Eastbound</option>
        <option value="westbound">Westbound</option>
      </select>
      <button class="ed-action outline" onclick="startDrawLine()" style="margin-top:.5rem">✏️ Draw route (click stations in order)</button>
      <button class="ed-action outline" onclick="undoLinePoint()">↩ Undo last point</button>
      <button class="ed-action outline" onclick="cancelDrawLine()">Cancel drawing</button>
      <div id="drawLineStatus" style="font-size:.75rem;color:var(--gray);margin-top:.4rem"></div>
    </div>

    <div class="ed-sec">
      <div class="ed-lbl">All lines</div>
      <div id="lineList"></div>
    </div>

    <div class="ed-sec">
      <div class="ed-lbl" style="color:var(--red)">Danger</div>
      <button class="ed-action danger" onclick="deleteSelectedLine()">Delete selected line</button>
    </div>
  </div>

  <!-- STATIONS TAB -->
  <div id="panelStations" class="hidden">
    <div class="ed-head"><span>Stations & Stops</span><button onclick="closePanel()" style="margin-left:auto;background:none;border:none;font-size:1.1rem;cursor:pointer">✕</button></div>

    <div class="ed-sec">
      <div class="ed-lbl">Selected stop</div>
      <input class="ed-input" id="stName" placeholder="Station name" style="margin-bottom:.4rem">
      <input class="ed-input" id="stStreet" placeholder="Street / cross-street (optional)" style="margin-bottom:.4rem">
      <select class="ed-input" id="stType">
        <option value="stop">Bus stop</option>
        <option value="station">Rail station</option>
        <option value="hub">Hub (multi-line)</option>
      </select>
      <div class="ed-row" style="margin-top:.4rem">
        <input class="ed-input" id="stX" placeholder="X" readonly>
        <input class="ed-input" id="stY" placeholder="Y" readonly>
      </div>
      <button class="ed-action outline" onclick="setTool('station')" style="margin-top:.5rem">📍 Click map to place</button>
      <button class="ed-action" onclick="saveStation()">Save stop</button>
      <button class="ed-action danger" onclick="deleteStation()">Delete stop</button>
    </div>

    <div class="ed-sec">
      <div class="ed-lbl">All stops</div>
      <div id="stationList" style="max-height:240px;overflow-y:auto;"></div>
    </div>
  </div>

  <!-- VEHICLES TAB -->
  <div id="panelVehicles" class="hidden">
    <div class="ed-head"><span>Live Vehicles</span><button onclick="closePanel()" style="margin-left:auto;background:none;border:none;font-size:1.1rem;cursor:pointer">✕</button></div>

    <div class="ed-sec">
      <div class="ed-lbl">Place / edit vehicle</div>
      <select class="ed-input" id="vLine" style="margin-bottom:.4rem"><option value="">Select line…</option></select>
      <input class="ed-input" id="vLabel" placeholder="Vehicle label (e.g. Bus 42)" style="margin-bottom:.4rem">
      <select class="ed-input" id="vNextStation" style="margin-bottom:.4rem"><option value="">Next station…</option></select>
      <div class="ed-row">
        <input class="ed-input" id="vSpeed" type="number" placeholder="Speed km/h" value="30">
        <select class="ed-input" id="vStatus">
          <option value="in_service">In service</option>
          <option value="delayed">Delayed</option>
          <option value="out_of_service">Out of service</option>
        </select>
      </div>
      <div class="ed-row" style="margin-top:.4rem">
        <input class="ed-input" id="vX" placeholder="X" readonly>
        <input class="ed-input" id="vY" placeholder="Y" readonly>
      </div>
      <button class="ed-action outline" onclick="setTool('vehicle')" style="margin-top:.5rem">🚌 Click map to place</button>
      <button class="ed-action" onclick="saveVehicle()">Save vehicle</button>
      <button class="ed-action danger" onclick="deleteVehicle()">Remove vehicle</button>
    </div>

    <div class="ed-sec">
      <div class="ed-lbl">Live vehicles</div>
      <div id="vehicleList"></div>
    </div>
  </div>
</div>

<div class="ed-status" id="edStatus"></div>
<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
const ADMIN = 'your-admin-token-here'; // set to match Worker env var ADMIN_TOKEN
setActiveNav('editor');
initLoginForms();

// ── STATE ─────────────────────────────────────────────
let tool = 'select';
let allLines = {{}}, allStations = [], allSegments = [], allStreets = [], allVehicles = [];
let selectedLine = null, selectedStation = null, selectedVehicle = null;
let hitTargets = [];

// Line-drawing state: click stations in order to build a route
let drawingStations = []; // [{{id,x,y,name}}]
let drawingSegmentPoints = []; // raw polyline points being collected between two stations
let isDrawingLine = false;
let drawingBetweenClick = false; // true while adding intermediate curve points between two stations

// Street drawing state
let streetPoints = [];
let isDrawingStreet = false;

const engine = new CanvasEngine('canvasWrap','canvas', {{
  scale: 1, minScale:.15, maxScale:4, worldW:3000, worldH:3000, gridSize:100,
  onDraw: draw,
  onClick: handleClick
}});

function status(msg, dur=3000) {{
  const el = document.getElementById('edStatus');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(()=>el.classList.remove('show'), dur);
}}

function hint(msg) {{
  const el = document.getElementById('hintBar');
  if (!msg) {{ el.classList.remove('show'); return; }}
  el.textContent = msg; el.classList.add('show');
}}

// ── TOOL SWITCHING ────────────────────────────────────
function setTool(t) {{
  tool = t;
  if (t !== 'line') cancelDrawLine();
  if (t !== 'street') cancelDrawStreet();
  document.querySelectorAll('.ed-toolbar .ed-btn').forEach(b=>b.classList.remove('active'));
  const map = {{select:'btnSelect',street:'btnStreet',line:'btnLine',station:'btnStation',vehicle:'btnVehicle'}};
  document.getElementById(map[t])?.classList.add('active');

  const hints = {{
    select: '',
    street: 'Click to add street points. Click ✓ Finish Street button when done.',
    line: selectedLine ? `Drawing route for ${{selectedLine}}. Click stations in order, or click empty space to add a curve point, then click the next station.` : 'Select a line in the panel first.',
    station: 'Click the map to place a new station/stop.',
    vehicle: 'Click the map to place a live vehicle.'
  }};
  hint(hints[t]);
  engine.wrap.classList.toggle('drawing', t!=='select');
}}

// ── MAP CLICK ROUTING ─────────────────────────────────
function handleClick(wx, wy) {{
  if (tool === 'station') {{
    document.getElementById('stX').value = Math.round(wx);
    document.getElementById('stY').value = Math.round(wy);
    selectedStation = null;
    document.getElementById('stName').value = '';
    document.getElementById('stStreet').value = '';
    openPanel('stations');
    status('Position set — fill in name and save.');
    return;
  }}

  if (tool === 'vehicle') {{
    document.getElementById('vX').value = Math.round(wx);
    document.getElementById('vY').value = Math.round(wy);
    selectedVehicle = null;
    openPanel('vehicles');
    status('Position set — fill in details and save.');
    return;
  }}

  if (tool === 'street') {{
    streetPoints.push([Math.round(wx), Math.round(wy)]);
    isDrawingStreet = true;
    status(`Street point ${{streetPoints.length}} added`);
    engine.render();
    return;
  }}

  if (tool === 'line') {{
    handleLineDrawClick(wx, wy);
    return;
  }}

  // select tool: hit test stations / vehicles
  const tolerance = 16/engine.scale;
  let best=null,bestDist=Infinity;
  for (const item of hitTargets) {{
    const d = Math.hypot(item.x-wx,item.y-wy);
    if (d<tolerance && d<bestDist) {{ bestDist=d; best=item; }}
  }}
  if (best) {{
    if (best.isVehicle) {{ selectVehicleForEdit(best.data); openPanel('vehicles'); }}
    else {{ selectStationForEdit(best.data); openPanel('stations'); }}
  }}
}}

// ── LINE DRAWING (click stations in order; supports curve points between) ──
function startDrawLine() {{
  if (!selectedLine) {{ toast('Select or create a line first'); return; }}
  setTool('line');
  drawingStations = [];
  drawingSegmentPoints = [];
  isDrawingLine = true;
  document.getElementById('drawLineStatus').textContent = 'Click your first station…';
}}

function handleLineDrawClick(wx, wy) {{
  if (!isDrawingLine) {{ toast('Click "Draw route" first'); return; }}

  // Check if click is near an existing station (snap)
  const tolerance = 20/engine.scale;
  const station = allStations.find(s => Math.hypot(s.x-wx,s.y-wy) < tolerance);

  if (station) {{
    // Add this station to the route; flush any pending curve points as the segment to it
    if (drawingStations.length > 0) {{
      drawingSegmentPoints.push([station.x, station.y]);
    }}
    drawingStations.push(station);
    drawingSegmentPoints = [[station.x, station.y]]; // reset, start new segment from here
    document.getElementById('drawLineStatus').textContent =
      `${{drawingStations.length}} station(s): ${{drawingStations.map(s=>s.name).join(' → ')}}. Click next station (or curve point).`;
    status(`Added station: ${{station.name}}`);
  }} else {{
    // Curve point (only valid once we have at least one station)
    if (drawingStations.length === 0) {{ toast('Click a station first'); return; }}
    drawingSegmentPoints.push([Math.round(wx), Math.round(wy)]);
    status('Curve point added');
  }}
  engine.render();
}}

function undoLinePoint() {{
  if (drawingSegmentPoints.length > 1) {{
    drawingSegmentPoints.pop();
  }} else if (drawingStations.length > 1) {{
    drawingStations.pop();
    drawingSegmentPoints = [[drawingStations[drawingStations.length-1].x, drawingStations[drawingStations.length-1].y]];
  }}
  engine.render();
}}

async function finishDrawLine() {{
  if (drawingStations.length < 2) {{ toast('Need at least 2 stations'); return; }}
  const direction = document.getElementById('lineDirection').value;

  // Build segments: one per consecutive station pair
  const segments = [];
  for (let i=0; i<drawingStations.length-1; i++) {{
    // For simplicity here, each segment is a straight polyline; curve points collected
    // during drawing were appended progressively — reconstruct per-pair from stored points
    segments.push({{
      from_station_id: drawingStations[i].id,
      to_station_id: drawingStations[i+1].id,
      points: [[drawingStations[i].x,drawingStations[i].y],[drawingStations[i+1].x,drawingStations[i+1].y]]
    }});
  }}

  try {{
    await fetch(API+'/api/admin/line-segments', {{
      method:'POST', headers:{{'Content-Type':'application/json','Authorization':'Bearer '+ADMIN}},
      body: JSON.stringify({{ line_id: selectedLine, direction, segments }})
    }});
    toast('Route saved ✓');
    cancelDrawLine();
    loadAllData();
  }} catch(e) {{ toast(e.message); }}
}}

function cancelDrawLine() {{
  isDrawingLine = false;
  drawingStations = [];
  drawingSegmentPoints = [];
  document.getElementById('drawLineStatus').textContent = '';
  engine.render();
}}

// ── STREET DRAWING ────────────────────────────────────
async function finishDrawStreet() {{
  if (streetPoints.length < 2) {{ toast('Need at least 2 points'); return; }}
  try {{
    await fetch(API+'/api/admin/streets', {{
      method:'POST', headers:{{'Content-Type':'application/json','Authorization':'Bearer '+ADMIN}},
      body: JSON.stringify({{ name:'', points: streetPoints, width:6, color:'#D1D5DB' }})
    }});
    toast('Street saved ✓');
    cancelDrawStreet();
    loadAllData();
  }} catch(e) {{ toast(e.message); }}
}}

function cancelDrawStreet() {{
  isDrawingStreet = false;
  streetPoints = [];
  engine.render();
}}

// Double-click / Enter to finish either drawing mode
document.addEventListener('keydown', e => {{
  if (e.key === 'Enter') {{
    if (isDrawingLine) finishDrawLine();
    if (isDrawingStreet) finishDrawStreet();
  }}
  if (e.key === 'Escape') {{
    cancelDrawLine(); cancelDrawStreet(); setTool('select');
  }}
}});
engine.wrap.addEventListener('dblclick', () => {{
  if (isDrawingLine) finishDrawLine();
  if (isDrawingStreet) finishDrawStreet();
}});

// ── DRAW (canvas render) ──────────────────────────────
function draw(ctx) {{
  document.getElementById('zoomPct').textContent = Math.round(engine.scale*100)+'%';

  // Streets
  allStreets.forEach(st => {{
    const pts = JSON.parse(st.points_json);
    if (pts.length<2) return;
    ctx.strokeStyle = st.color||'#D1D5DB'; ctx.lineWidth = st.width||6;
    ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
    pts.slice(1).forEach(p=>ctx.lineTo(p[0],p[1]));
    ctx.stroke();
  }});

  // In-progress street
  if (isDrawingStreet && streetPoints.length) {{
    ctx.strokeStyle = '#9CA3AF'; ctx.lineWidth=5; ctx.setLineDash([8,6]);
    ctx.beginPath(); ctx.moveTo(streetPoints[0][0],streetPoints[0][1]);
    streetPoints.slice(1).forEach(p=>ctx.lineTo(p[0],p[1]));
    ctx.stroke(); ctx.setLineDash([]);
    streetPoints.forEach(p => {{ ctx.beginPath(); ctx.arc(p[0],p[1],5,0,7); ctx.fillStyle='#6B7280'; ctx.fill(); }});
  }}

  // Line segments
  allSegments.forEach(seg => {{
    const line = allLines[seg.line_id];
    if (!line) return;
    const pts = JSON.parse(seg.points_json);
    if (pts.length<2) return;
    const isSel = seg.line_id === selectedLine;
    ctx.strokeStyle = line.color; ctx.lineWidth = (line.type==='rail'?6:4) + (isSel?2:0);
    ctx.lineCap='round'; ctx.lineJoin='round'; ctx.globalAlpha = isSel?1:.75;
    ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
    pts.slice(1).forEach(p=>ctx.lineTo(p[0],p[1]));
    ctx.stroke(); ctx.globalAlpha=1;
  }});

  // In-progress line drawing
  if (isDrawingLine && drawingStations.length) {{
    const color = allLines[selectedLine]?.color || '#2563EB';
    // draw segment-in-progress
    if (drawingSegmentPoints.length > 1) {{
      ctx.strokeStyle = color; ctx.lineWidth = 4; ctx.setLineDash([10,6]); ctx.globalAlpha=.8;
      ctx.beginPath(); ctx.moveTo(drawingSegmentPoints[0][0],drawingSegmentPoints[0][1]);
      drawingSegmentPoints.slice(1).forEach(p=>ctx.lineTo(p[0],p[1]));
      ctx.stroke(); ctx.setLineDash([]); ctx.globalAlpha=1;
    }}
    // highlight selected stations in order
    drawingStations.forEach((s,i) => {{
      ctx.beginPath(); ctx.arc(s.x,s.y,12,0,Math.PI*2);
      ctx.fillStyle = color; ctx.fill();
      ctx.strokeStyle='white'; ctx.lineWidth=3; ctx.stroke();
      ctx.save(); ctx.translate(s.x,s.y); ctx.scale(1/engine.scale,1/engine.scale);
      ctx.fillStyle='white'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(i+1, 0, 0);
      ctx.restore();
    }});
  }}

  // Stations
  hitTargets = [];
  allStations.forEach(s => {{
    const isSel = selectedStation && s.id === selectedStation.id;
    const r = s.type === 'hub' ? 11 : 7;
    ctx.beginPath(); ctx.arc(s.x,s.y,r,0,Math.PI*2);
    ctx.fillStyle = isSel ? '#DC2626' : (s.type==='hub' ? '#111827' : '#374151');
    ctx.fill();
    ctx.strokeStyle='white'; ctx.lineWidth=3; ctx.stroke();

    if (engine.scale > .4) {{
      ctx.save(); ctx.translate(s.x,s.y); ctx.scale(1/engine.scale,1/engine.scale);
      ctx.fillStyle='#111827'; ctx.font='600 11px -apple-system,sans-serif';
      ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.fillText(s.name, r*engine.scale+6, 0);
      ctx.restore();
    }}
    hitTargets.push({{x:s.x,y:s.y,data:s}});
  }});

  // Vehicles
  allVehicles.forEach(v => {{
    ctx.beginPath(); ctx.arc(v.x,v.y,15,0,Math.PI*2);
    ctx.fillStyle = v.color||'#666'; ctx.fill();
    ctx.strokeStyle='white'; ctx.lineWidth=3; ctx.stroke();
    ctx.save(); ctx.translate(v.x,v.y); ctx.scale(1/engine.scale,1/engine.scale);
    ctx.fillStyle = v.text_color||'white'; ctx.font='bold 10px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(v.line_id,0,0);
    ctx.restore();
    hitTargets.push({{x:v.x,y:v.y,data:v,isVehicle:true}});
  }});
}}

function fitAll() {{
  const pts = allStations.map(s=>[s.x,s.y]);
  if (pts.length) engine.fitToContent(pts);
  else engine.centerOn(1500,1500,1);
}}

// ── PANEL MANAGEMENT ──────────────────────────────────
let currentPanel = null;
function openPanel(name) {{
  currentPanel = name;
  document.getElementById('edPanel').classList.add('open');
  ['Lines','Stations','Vehicles'].forEach(n => document.getElementById('panel'+n).classList.toggle('hidden', n.toLowerCase()!==name));
  if (name==='lines') refreshLineList();
  if (name==='stations') refreshStationList();
  if (name==='vehicles') refreshVehicleList();
}}
function closePanel() {{ document.getElementById('edPanel').classList.remove('open'); }}

// ── LINES CRUD ────────────────────────────────────────
async function saveLine() {{
  const id = document.getElementById('lineId').value.trim();
  const name = document.getElementById('lineName').value.trim();
  if (!id||!name) {{ toast('ID and name required'); return; }}
  const body = {{
    id, name, type: document.getElementById('lineType').value,
    color: document.getElementById('lineColor').value,
    text_color: document.getElementById('lineTextColor').value,
    is_loop: document.getElementById('lineLoop').checked,
    frequency: document.getElementById('lineFreq').value
  }};
  try {{
    await fetch(API+'/api/admin/lines',{{method:'POST',headers:{{'Content-Type':'application/json','Authorization':'Bearer '+ADMIN}},body:JSON.stringify(body)}});
    toast('Line saved ✓'); selectedLine=id; loadAllData();
  }} catch(e) {{ toast(e.message); }}
}}

function selectLine(id) {{
  selectedLine = id;
  const l = allLines[id]; if (!l) return;
  document.getElementById('lineId').value=l.id;
  document.getElementById('lineName').value=l.name;
  document.getElementById('lineType').value=l.type;
  document.getElementById('lineColor').value=l.color;
  document.getElementById('lineTextColor').value=l.text_color||'#FFFFFF';
  document.getElementById('lineLoop').checked=!!l.is_loop;
  document.getElementById('lineFreq').value=l.frequency||'';
  refreshLineList();
  engine.render();
}}

function refreshLineList() {{
  document.getElementById('lineList').innerHTML = Object.values(allLines).map(l => `
    <div class="line-item ${{selectedLine===l.id?'sel':''}}" onclick="selectLine('${{l.id}}')">
      <div style="width:28px;height:28px;border-radius:6px;background:${{l.color}};display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:900;color:${{l.text_color}};flex-shrink:0">${{l.id}}</div>
      <div><div style="font-weight:700;font-size:.85rem">${{l.name}}</div><div style="font-size:.7rem;color:var(--gray)">${{l.type}}</div></div>
    </div>`).join('') || '<div style="font-size:.8rem;color:var(--gray)">No lines yet.</div>';
}}

async function deleteSelectedLine() {{
  if (!selectedLine||!confirm(`Delete line ${{selectedLine}}? This removes its route and station assignments.`)) return;
  await fetch(API+`/api/admin/lines/${{selectedLine}}`,{{method:'DELETE',headers:{{'Authorization':'Bearer '+ADMIN}}}});
  selectedLine=null; toast('Line deleted'); loadAllData();
}}

// ── STATIONS CRUD ─────────────────────────────────────
async function saveStation() {{
  const name = document.getElementById('stName').value.trim();
  const x = parseFloat(document.getElementById('stX').value);
  const y = parseFloat(document.getElementById('stY').value);
  if (!name||isNaN(x)||isNaN(y)) {{ toast('Name and position required'); return; }}
  const body = {{ name, x, y, type: document.getElementById('stType').value, street: document.getElementById('stStreet').value }};
  const method = selectedStation ? 'PUT' : 'POST';
  const url = selectedStation ? `/api/admin/stations/${{selectedStation.id}}` : '/api/admin/stations';
  try {{
    await fetch(API+url,{{method,headers:{{'Content-Type':'application/json','Authorization':'Bearer '+ADMIN}},body:JSON.stringify(body)}});
    toast('Stop saved ✓'); selectedStation=null; loadAllData();
  }} catch(e) {{ toast(e.message); }}
}}

async function deleteStation() {{
  if (!selectedStation||!confirm('Delete this stop? This also removes its route connections.')) return;
  await fetch(API+`/api/admin/stations/${{selectedStation.id}}`,{{method:'DELETE',headers:{{'Authorization':'Bearer '+ADMIN}}}});
  selectedStation=null; toast('Stop deleted'); loadAllData();
}}

function selectStationForEdit(s) {{
  selectedStation = s;
  document.getElementById('stName').value=s.name;
  document.getElementById('stStreet').value=s.street||'';
  document.getElementById('stType').value=s.type||'stop';
  document.getElementById('stX').value=s.x;
  document.getElementById('stY').value=s.y;
  engine.render();
}}

function refreshStationList() {{
  document.getElementById('stationList').innerHTML = allStations.map(s => `
    <div class="line-item" onclick='selectStationForEdit(${{JSON.stringify(s)}})'>
      <span style="font-size:1rem">${{s.type==='hub'?'🔀':s.type==='station'?'🚆':'📍'}}</span>
      <div><div style="font-weight:700;font-size:.82rem">${{s.name}}</div><div style="font-size:.7rem;color:var(--gray)">${{Math.round(s.x)}}, ${{Math.round(s.y)}}</div></div>
    </div>`).join('') || '<div style="font-size:.8rem;color:var(--gray);padding:.5rem 0">No stops yet.</div>';
}}

// ── VEHICLES CRUD ─────────────────────────────────────
function populateVehicleSelects() {{
  document.getElementById('vLine').innerHTML = '<option value="">Select line…</option>' +
    Object.values(allLines).map(l=>`<option value="${{l.id}}">${{l.id}} — ${{l.name}}</option>`).join('');
  document.getElementById('vNextStation').innerHTML = '<option value="">Next station…</option>' +
    allStations.map(s=>`<option value="${{s.id}}">${{s.name}}</option>`).join('');
}}

async function saveVehicle() {{
  const line_id = document.getElementById('vLine').value;
  const x = parseFloat(document.getElementById('vX').value);
  const y = parseFloat(document.getElementById('vY').value);
  if (!line_id||isNaN(x)||isNaN(y)) {{ toast('Line and position required'); return; }}
  const body = {{
    line_id, x, y,
    vehicle_label: document.getElementById('vLabel').value,
    speed_kmh: parseFloat(document.getElementById('vSpeed').value)||0,
    next_station_id: document.getElementById('vNextStation').value || null,
    status: document.getElementById('vStatus').value
  }};
  const method = selectedVehicle ? 'PUT' : 'POST';
  const url = selectedVehicle ? `/api/admin/live/${{selectedVehicle.id}}` : '/api/admin/live';
  try {{
    await fetch(API+url,{{method,headers:{{'Content-Type':'application/json','Authorization':'Bearer '+ADMIN}},body:JSON.stringify(body)}});
    toast('Vehicle saved ✓'); selectedVehicle=null; loadAllData();
  }} catch(e) {{ toast(e.message); }}
}}

async function deleteVehicle() {{
  if (!selectedVehicle||!confirm('Remove this vehicle?')) return;
  await fetch(API+`/api/admin/live/${{selectedVehicle.id}}`,{{method:'DELETE',headers:{{'Authorization':'Bearer '+ADMIN}}}});
  selectedVehicle=null; toast('Vehicle removed'); loadAllData();
}}

function selectVehicleForEdit(v) {{
  selectedVehicle=v;
  document.getElementById('vLine').value=v.line_id;
  document.getElementById('vLabel').value=v.vehicle_label||'';
  document.getElementById('vSpeed').value=v.speed_kmh||0;
  document.getElementById('vStatus').value=v.status||'in_service';
  document.getElementById('vNextStation').value=v.next_station_id||'';
  document.getElementById('vX').value=v.x;
  document.getElementById('vY').value=v.y;
  engine.render();
}}

function refreshVehicleList() {{
  document.getElementById('vehicleList').innerHTML = allVehicles.map(v => `
    <div class="line-item" onclick='selectVehicleForEdit(${{JSON.stringify(v)}})'>
      <div style="width:26px;height:26px;border-radius:50%;background:${{v.color||'#666'}};display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:900;color:white">${{v.line_id}}</div>
      <div><div style="font-weight:700;font-size:.82rem">${{v.vehicle_label||'Vehicle '+v.id}}</div><div style="font-size:.7rem;color:var(--gray)">${{v.speed_kmh||0}} km/h · ${{v.status}}</div></div>
    </div>`).join('') || '<div style="font-size:.8rem;color:var(--gray);padding:.5rem 0">No vehicles placed.</div>';
}}

// ── LOAD ALL DATA ─────────────────────────────────────
async function loadAllData() {{
  try {{
    const [lines, stations, streets, vehicles] = await Promise.all([
      apiFetch('/api/lines'), apiFetch('/api/stations'), apiFetch('/api/streets'), apiFetch('/api/live')
    ]);
    allLines = {{}}; lines.forEach(l=>allLines[l.id]=l);
    allStations = stations; allStreets = streets; allVehicles = vehicles;

    allSegments = [];
    for (const line of lines) {{
      try {{ const d = await apiFetch(`/api/lines/${{encodeURIComponent(line.id)}}`); allSegments.push(...d.segments); }} catch {{}}
    }}

    populateVehicleSelects();
    engine.render();
    if (currentPanel==='lines') refreshLineList();
    if (currentPanel==='stations') refreshStationList();
    if (currentPanel==='vehicles') refreshVehicleList();
  }} catch(e) {{ toast('Failed to load: '+e.message); }}
}}

loadAllData();
fitAll();

// Helper finish buttons floating near toolbar when drawing
const origDraw = draw;
</script>

<!-- FINISH DRAWING BUTTONS -->
<div id="finishBar" style="position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);z-index:1850;display:none;gap:.5rem;">
  <button onclick="if(isDrawingLine)finishDrawLine();if(isDrawingStreet)finishDrawStreet();" style="background:var(--green);color:white;border:none;padding:.7rem 1.4rem;border-radius:999px;font-weight:700;font-size:.9rem;box-shadow:var(--shadow-md)">✓ Finish</button>
</div>
<script>
setInterval(() => {{
  document.getElementById('finishBar').style.display = (isDrawingLine||isDrawingStreet) ? 'flex' : 'none';
}}, 200);
</script>
</body>
