<script>
setActiveNav('index');
initLoginForms();

const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([40.7128, -74.006], 13);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap, CARTO'
}).addTo(map);

L.control.zoom({ position: 'bottomright' }).addTo(map);

let userLat = null, userLng = null;
let userMarker = null;
let vehicleMarkers = [];
let lineMarkers = [];
let refreshTimer = null;

// ── LOCATE USER ─────────────────────────────────────
function locateUser() {
  if (!navigator.geolocation) { loadNearby(40.7128, -74.006); return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      map.setView([userLat, userLng], 15);

      if (userMarker) userMarker.remove();
      userMarker = L.circleMarker([userLat, userLng], {
        radius: 8, fillColor: '#2563EB', fillOpacity: 1,
        color: 'white', weight: 3, interactive: false
      }).addTo(map);

      loadNearby(userLat, userLng);
      loadLiveVehicles();
      loadLineGeometry();
      document.getElementById('walkEta').textContent = '—';
    },
    () => {
      toast('Location unavailable — showing default area');
      loadNearby(40.7128, -74.006);
      loadLiveVehicles();
      loadLineGeometry();
    },
    { enableHighAccuracy: true, timeout: 8000 }
  );
}

// ── LOAD NEARBY ─────────────────────────────────────
async function loadNearby(lat, lng) {
  try {
    const stations = await apiFetch(`/api/stations?lat=${lat}&lng=${lng}&radius=1.5`);
    const vehicles = await apiFetch(`/api/live`);
    const lines = await apiFetch(`/api/lines`);

    // Create line lookup
    const lineMap = {};
    lines.forEach(l => lineMap[l.id] = l);

    renderNearby(stations, vehicles, lineMap, lat, lng);
    renderStationMarkers(stations, lineMap);
  } catch(e) {
    document.getElementById('nearbyContent').innerHTML =
      '<div class="empty">⚠️ Could not load services</div>';
  }
}

// ── RENDER NEARBY ────────────────────────────────────
function renderNearby(stations, vehicles, lineMap, lat, lng) {
  const content = document.getElementById('nearbyContent');
  if (!stations.length) {
    content.innerHTML = '<div class="empty">No nearby stations found.<br><small>Try zooming out or moving the map.</small></div>';
    return;
  }

  // Build arrival data combining schedule + live vehicles
  const arrivals = [];

  // Add live vehicles nearby
  vehicles.forEach(v => {
    const dist = haversine(lat, lng, v.lat, v.lng);
    if (dist > 3) return;
    const line = lineMap[v.line_id];
    if (!line) return;
    let etaMin = null;
    if (v.speed_kmh > 1 && dist > 0) etaMin = Math.max(1, Math.round((dist / v.speed_kmh) * 60));
    arrivals.push({ line, eta: etaMin, headsign: v.next_station_name || line.name, location: v.next_station_name, isLive: true, vehicle: v });
  });

  // Add stations with their lines
  stations.slice(0, 8).forEach(st => {
    const lineIds = (st.line_ids || '').split(',').filter(Boolean);
    lineIds.forEach(lid => {
      const line = lineMap[lid];
      if (!line) return;
      const dist = haversine(lat, lng, st.lat, st.lng);
      if (!arrivals.find(a => a.line?.id === lid)) {
        arrivals.push({ line, eta: null, headsign: line.name, location: st.name, isLive: false, stationDist: dist });
      }
    });
  });

  if (!arrivals.length) {
    content.innerHTML = '<div class="empty">No transit services nearby.</div>';
    return;
  }

  // Sort by eta
  arrivals.sort((a,b) => (a.eta||999) - (b.eta||999));

  content.innerHTML = arrivals.slice(0,8).map(a => {
    const etaStr = a.eta != null ? a.eta : '—';
    const minStr = a.eta != null ? (a.eta === 1 ? 'minute' : 'minutes') : '';
    const liveIcon = a.isLive ? `<svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01M4.929 7.929a10 10 0 0114.142 0M6.34 10.66a8 8 0 0111.32 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>` : '';
    return `
      <div class="arrival-card" style="background:${a.line.color};color:${a.line.text_color}"
           onclick="clickArrival('${a.line.id}','${a.vehicle?.id||''}')">
        <div class="line-badge">${a.line.short_name || a.line.id}</div>
        <div class="arrival-main">
          <div class="arrival-title">${liveIcon}&nbsp;${a.headsign}</div>
          <div class="arrival-sub">${a.location || ''}</div>
        </div>
        <div class="arrival-mins">
          <div class="arrival-num">${etaStr}</div>
          <div class="arrival-unit">${minStr}</div>
        </div>
      </div>
    `;
  }).join('');
}

// ── STATION MARKERS ──────────────────────────────────
function renderStationMarkers(stations, lineMap) {
  lineMarkers.forEach(m => m.remove());
  lineMarkers = [];
  stations.forEach(st => {
    const lineIds = (st.line_ids||'').split(',').filter(Boolean);
    const isHub = lineIds.length > 1 || st.type === 'hub';
    const firstLine = lineMap[lineIds[0]];
    const color = firstLine?.color || '#6B7280';

    const el = document.createElement('div');
    if (isHub) {
      el.className = 'hub-marker';
      el.style.cssText = `background:${color};width:20px;height:20px;border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;font-size:.5rem;font-weight:900;color:white;`;
      el.textContent = lineIds.slice(0,2).join('');
    } else {
      el.className = 'station-marker';
      el.style.cssText = `background:${color};width:12px;height:12px;border-radius:50%;border:3px solid white;box-shadow:0 1px 4px rgba(0,0,0,.3);`;
    }

    const m = L.marker([st.lat, st.lng], {
      icon: L.divIcon({ html: el.outerHTML, iconSize:[isHub?20:12,isHub?20:12], iconAnchor:[isHub?10:6,isHub?10:6], className:'' })
    }).addTo(map);
    m.on('click', () => showStationPopup(st, lineIds.map(id => lineMap[id]).filter(Boolean)));
    lineMarkers.push(m);
  });
}

// ── LIVE VEHICLES ────────────────────────────────────
async function loadLiveVehicles() {
  vehicleMarkers.forEach(m => m.remove());
  vehicleMarkers = [];
  try {
    const vehicles = await apiFetch('/api/live');
    vehicles.forEach(v => {
      const el = document.createElement('div');
      el.style.cssText = `background:${v.color};width:36px;height:36px;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:900;color:${v.text_color};cursor:pointer;`;
      el.textContent = v.line_id;
      const m = L.marker([v.lat, v.lng], {
        icon: L.divIcon({ html: el.outerHTML, iconSize:[36,36], iconAnchor:[18,18], className:'' })
      }).addTo(map);
      m.on('click', () => showVehiclePopup(v));
      vehicleMarkers.push(m);
    });
  } catch { /* silent */ }
}

// ── LINE GEOMETRY ────────────────────────────────────
async function loadLineGeometry() {
  try {
    const lines = await apiFetch('/api/lines');
    for (const line of lines) {
      const data = await apiFetch(`/api/lines/${encodeURIComponent(line.id)}`);
      data.paths.forEach(seg => {
        const coords = JSON.parse(seg.latlngs_json);
        if (coords.length > 1) {
          L.polyline(coords, { color: line.color, weight: line.type==='rail'?5:4, opacity:.85 }).addTo(map);
        }
      });
    }
  } catch { /* silent */ }
}

// ── VEHICLE POPUP ────────────────────────────────────
function showVehiclePopup(v) {
  const head = document.getElementById('vpopupHead');
  head.style.background = v.color;
  head.style.color = v.text_color;
  document.getElementById('vpopupDir').innerHTML = `<span style="font-size:1rem">→</span> ${v.next_station_name||v.line_name||v.line_id}`;
  document.getElementById('vpopupBig').textContent = v.line_id;
  document.getElementById('vpopupSub').textContent = v.line_name || '';
  document.getElementById('vpopupStations').textContent = '—';
  const speedEta = v.speed_kmh > 1 && userLat ? Math.max(1,Math.round((haversine(userLat,userLng,v.lat,v.lng)/v.speed_kmh)*60)) : '—';
  document.getElementById('vpopupEta').textContent = speedEta;
  document.getElementById('vpopupSpeed').textContent = v.speed_kmh ? Math.round(v.speed_kmh) : '—';
  document.getElementById('vpopupStatus').textContent = v.status === 'in_service' ? '✓' : v.status;
  document.getElementById('vpopup').classList.add('open');
}

function closeVpopup() {
  document.getElementById('vpopup').classList.remove('open');
}

function clickArrival(lineId, vehicleId) {
  window.location.href = `planner.html?line=${lineId}`;
}

// ── MAP CLICK (dismiss popups) ────────────────────────
map.on('click', () => closeVpopup());

// ── REFRESH every 30s ─────────────────────────────────
function startRefresh() {
  clearInterval(refreshTimer);
  refreshTimer = setInterval(() => {
    loadLiveVehicles();
    if (userLat) loadNearby(userLat, userLng);
  }, 30000);
}

// ── INIT ──────────────────────────────────────────────
locateUser();
startRefresh();
</script>
</body>
