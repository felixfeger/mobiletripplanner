<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>City Metro Transit</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

{nav_login}

<!-- CANVAS MAP -->
<div class="canvas-wrap" id="canvasWrap">
  <canvas id="canvas"></canvas>
</div>

<!-- SEARCH PILL -->
<button class="search-pill" onclick="window.location.href='planner.html'" aria-label="Search">
  <svg width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="#9CA3AF" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35" stroke-linecap="round"/></svg>
  <input placeholder="Where to?" readonly tabindex="-1">
</button>

<!-- ZOOM CONTROLS -->
<div class="canvas-ctrls" id="zoomCtrls">
  <button class="zoom-btn" onclick="engine.zoomBy(1.3)" aria-label="Zoom in">+</button>
  <button class="zoom-btn" onclick="engine.zoomBy(0.77)" aria-label="Zoom out">−</button>
  <button class="zoom-btn" onclick="fitAll()" aria-label="Fit all" title="Show full network">⤢</button>
</div>

<!-- BOTTOM SHEET -->
<div class="sheet" id="sheet">
  <div class="sheet-handle-wrap" id="sheetHandle">
    <div class="sheet-handle"></div>
  </div>
  <div class="sheet-scroll">
    <div id="nearbyContent">
      <div class="empty"><div class="spinner"></div><span>Loading network…</span></div>
    </div>
  </div>
</div>

<!-- STATION / VEHICLE POPUP -->
<div class="vpopup" id="vpopup">
  <div class="vpopup-head" id="vpopupHead">
    <button class="vpopup-close" onclick="closeVpopup()">✕</button>
    <div class="vpopup-direction" id="vpopupDir"></div>
    <div class="vpopup-big" id="vpopupBig"></div>
    <div class="vpopup-sub" id="vpopupSub"></div>
  </div>
  <div id="vpopupBody"></div>
  <div class="vpopup-action-row">
    <button onclick="planFromPopup()">Plan a trip →</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
setActiveNav('index');
initLoginForms();

let allLines = {{}}, allStations = [], allSegments = [], allStreets = [], allVehicles = [];
let stationScreenPos = [];
let _popupStationId = null;

// ── ENGINE ─────────────────────────────────────────────
const engine = new CanvasEngine('canvasWrap','canvas', {{
  scale:1, minScale:.1, maxScale:4, fitMaxScale:2.0,
  worldW:6000, worldH:6000, gridSize:100,
  onDraw: draw, onClick: handleClick
}});
engine.render();

// ── DRAW ───────────────────────────────────────────────
function draw(ctx) {{
  // Streets
  allStreets.forEach(st => {{
    const pts = JSON.parse(st.points_json);
    if (pts.length<2) return;
    ctx.strokeStyle = st.color||'#D1D5DB';
    ctx.lineWidth = st.width||6;
    ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
    pts.slice(1).forEach(p=>ctx.lineTo(p[0],p[1]));
    ctx.stroke();
  }});

  // Line segments
  allSegments.forEach(seg => {{
    const line = allLines[seg.line_id];
    if (!line) return;
    const pts = JSON.parse(seg.points_json);
    if (pts.length<2) return;
    ctx.strokeStyle = line.color;
    ctx.lineWidth = line.type==='rail' ? 6 : 4;
    ctx.lineCap='round'; ctx.lineJoin='round'; ctx.globalAlpha=.92;
    ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
    pts.slice(1).forEach(p=>ctx.lineTo(p[0],p[1]));
    ctx.stroke(); ctx.globalAlpha=1;
  }});

  // Stations
  stationScreenPos = [];
  allStations.forEach(s => {{
    const lineIds = (s.line_ids||'').split(',').filter(Boolean);
    const isHub = lineIds.length>1 || s.type==='hub';
    const col = allLines[lineIds[0]]?.color || '#6B7280';
    const r = isHub ? 11 : 7;

    ctx.beginPath(); ctx.arc(s.x,s.y,r,0,Math.PI*2);
    ctx.fillStyle = isHub ? '#111827' : col;
    ctx.fill(); ctx.strokeStyle='white'; ctx.lineWidth=3; ctx.stroke();

    if (engine.scale > 0.45) {{
      ctx.save();
      ctx.translate(s.x,s.y); ctx.scale(1/engine.scale,1/engine.scale);
      ctx.fillStyle='#111827';
      ctx.font="600 11px 'Helvetica Neue',Helvetica,Arial,sans-serif";
      ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.fillText(s.name, r*engine.scale+6, 0);
      ctx.restore();
    }}

    stationScreenPos.push({{x:s.x,y:s.y,r:(r+5)/engine.scale,data:s}});
  }});

  // Live vehicles
  allVehicles.forEach(v => {{
    const sr=17;
    ctx.save(); ctx.translate(v.x,v.y); ctx.scale(1/engine.scale,1/engine.scale);
    drawVehicleMarker(ctx,0,0,v.line_type,sr);
    ctx.restore();
    stationScreenPos.push({{x:v.x,y:v.y,r:(sr+6)/engine.scale,data:v,isVehicle:true}});
  }});
}}

// ── CLICK ──────────────────────────────────────────────
function handleClick(wx,wy) {{
  const tol = 18/engine.scale;
  let best=null,bestD=Infinity;
  for (const item of stationScreenPos) {{
    const d = Math.hypot(item.x-wx,item.y-wy);
    if (d<tol && d<bestD) {{ bestD=d; best=item; }}
  }}
  if (!best) {{ closeVpopup(); renderArrivalsList([]); return; }}
  if (best.isVehicle) showVehiclePopup(best.data);
  else showStationPopup(best.data);
}}

// ── FIT ────────────────────────────────────────────────
function fitAll() {{
  const pts=[];
  allStations.forEach(s=>pts.push([s.x,s.y]));
  allSegments.forEach(seg=>{{ try{{JSON.parse(seg.points_json).forEach(p=>pts.push(p));}}catch{{}} }});
  if (pts.length) engine.fitToContent(pts);
  else engine.centerOn(3000,3000,1);
}}

// ── ARRIVALS LIST ───────────────────────────────────────
function renderArrivalsList(filterLineIds) {{
  const content = document.getElementById('nearbyContent');
  const lineSet = filterLineIds.length ? new Set(filterLineIds) : null;

  const cards=[];
  allVehicles.forEach(v => {{
    if (lineSet && !lineSet.has(v.line_id)) return;
    const line=allLines[v.line_id]; if(!line) return;
    let eta=null;
    if (v.next_x!=null) eta=etaMinutesFromSpeed(Math.hypot(v.next_x-v.x,v.next_y-v.y),v.speed_kmh);
    cards.push({{line,eta,headsign:v.next_station_name||line.name,isLive:true}});
  }});

  const shown = lineSet ? [...lineSet] : Object.keys(allLines);
  shown.forEach(lid => {{
    const line=allLines[lid]; if(!line) return;
    if (!cards.find(c=>c.line.id===lid))
      cards.push({{line,eta:null,headsign:line.frequency||'See schedule',isLive:false}});
  }});

  if (!cards.length) {{
    content.innerHTML='<div class="empty">No services here</div>'; return;
  }}
  cards.sort((a,b)=>(a.eta??999)-(b.eta??999));

  const title = lineSet
    ? `<div class="arrival-section-title">Services at this stop</div>`
    : `<div class="arrival-section-title">Nearby services</div>`;

  content.innerHTML = title + cards.slice(0,10).map(c => `
    <div class="arrival-card" style="background:${{c.line.color}};color:${{c.line.text_color}}" onclick="window.location.href='planner.html?line=${{c.line.id}}'">
      <div class="line-badge">${{c.line.id}}</div>
      <div class="arrival-main">
        <div class="arrival-title">${{c.isLive?'● ':''}}${{escapeHtml(c.line.name)}}</div>
        <div class="arrival-sub">${{escapeHtml(c.headsign)}}</div>
      </div>
      <div class="arrival-mins">
        <div class="arrival-num">${{c.eta??'—'}}</div>
        <div class="arrival-unit">${{c.eta!=null?(c.eta===1?'min':'mins'):''}}</div>
      </div>
    </div>`).join('');
}}

function renderNearby() {{ renderArrivalsList([]); }}

// ── STATION POPUP ────────────────────────────────────────
function showStationPopup(s) {{
  _popupStationId = s.id;
  const lineIds=(s.line_ids||'').split(',').filter(Boolean);
  const lines=lineIds.map(id=>allLines[id]).filter(Boolean);
  const primary=lines[0]||{{color:'#111827',text_color:'#fff'}};

  const head=document.getElementById('vpopupHead');
  head.style.background=primary.color; head.style.color=primary.text_color;
  document.getElementById('vpopupDir').textContent=s.type==='hub'?'Transit Hub':s.type==='station'?'Rail Station':'Bus Stop';
  document.getElementById('vpopupBig').textContent=s.name;
  document.getElementById('vpopupBig').style.fontSize='1.5rem';
  document.getElementById('vpopupSub').textContent=s.street||'';

  // Lines served chips
  const lineChips=lines.map(l=>`<span class="line-chip" style="background:${{l.color}};color:${{l.text_color}}">${{l.id}}</span>`).join('');
  
  // Next arrivals (from live vehicles heading here)
  const incoming=allVehicles.filter(v=>
    v.next_station_name===s.name ||
    lineIds.includes(v.line_id)
  ).map(v=>{{
    const eta=v.next_x!=null ? etaMinutesFromSpeed(Math.hypot(v.next_x-v.x,v.next_y-v.y),v.speed_kmh) : null;
    return {{v,eta}};
  }}).filter(x=>x.eta!=null).sort((a,b)=>a.eta-b.eta).slice(0,4);

  const arrivalRows = incoming.length
    ? incoming.map(x=>`
      <div class="vpopup-arrival-row">
        <span class="line-chip" style="background:${{allLines[x.v.line_id]?.color||'#666'}};color:${{allLines[x.v.line_id]?.text_color||'#fff'}};font-size:.75rem;padding:.25rem .6rem">${{x.v.line_id}}</span>
        <div class="vpopup-arrival-name">${{escapeHtml(x.v.next_station_name||'Next stop')}}</div>
        <div class="vpopup-arrival-eta live">${{x.eta}} min</div>
      </div>`).join('')
    : `<div style="font-size:.82rem;color:var(--gray);padding:.5rem 0">No live vehicles detected</div>`;

  document.getElementById('vpopupBody').innerHTML = `
    <div class="vpopup-lines">${{lineChips||'<span style="color:var(--gray);font-size:.85rem">No lines assigned</span>'}}</div>
    <div class="vpopup-arrivals">
      <div style="font-size:.7rem;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem">Next arrivals</div>
      ${{arrivalRows}}
    </div>`;

  // Update the sheet arrivals to show this stop's lines
  renderArrivalsList(lineIds);
  document.getElementById('vpopup').classList.add('open');
}}

// ── VEHICLE POPUP ────────────────────────────────────────
function showVehiclePopup(v) {{
  _popupStationId = null;
  const head=document.getElementById('vpopupHead');
  head.style.background=v.color; head.style.color=v.text_color;

  const label=v.vehicle_label?.trim()||(v.line_type==='rail'?'Train':'Bus')+' '+v.id;
  document.getElementById('vpopupDir').textContent=`${{v.line_type==='rail'?'Rail':'Bus'}} · ${{escapeHtml(v.line_name||v.line_id)}}`;
  document.getElementById('vpopupBig').textContent=label;
  document.getElementById('vpopupBig').style.fontSize='1.7rem';
  document.getElementById('vpopupSub').textContent=`→ ${{v.next_station_name||'Unknown stop'}}`;

  const eta=v.next_x!=null ? etaMinutesFromSpeed(Math.hypot(v.next_x-v.x,v.next_y-v.y),v.speed_kmh) : null;

  document.getElementById('vpopupBody').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem;padding:.85rem 1rem">
      <div style="background:var(--gray-l);border-radius:var(--r-xs);padding:.8rem;text-align:center">
        <div style="font-size:1.6rem;font-weight:900;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:1rem;font-weight:800">${{escapeHtml(v.next_station_name||'—')}}</div>
        <div style="font-size:.7rem;color:var(--gray);font-weight:600;margin-top:2px">Next stop</div>
      </div>
      <div style="background:var(--gray-l);border-radius:var(--r-xs);padding:.8rem;text-align:center">
        <div style="font-size:1.6rem;font-weight:900">${{eta??'—'}}</div>
        <div style="font-size:.7rem;color:var(--gray);font-weight:600;margin-top:2px">Minutes away</div>
      </div>
      <div style="background:var(--gray-l);border-radius:var(--r-xs);padding:.8rem;text-align:center">
        <div style="font-size:1.6rem;font-weight:900">${{Math.round(v.speed_kmh||0)}}</div>
        <div style="font-size:.7rem;color:var(--gray);font-weight:600;margin-top:2px">mph</div>
      </div>
      <div style="background:var(--gray-l);border-radius:var(--r-xs);padding:.8rem;text-align:center">
        <div style="font-size:1rem;font-weight:800">${{v.status==='in_service'?'In Service':v.status}}</div>
        <div style="font-size:.7rem;color:var(--gray);font-weight:600;margin-top:2px">Status</div>
      </div>
    </div>`;

  document.getElementById('vpopup').classList.add('open');
}}

function closeVpopup() {{ document.getElementById('vpopup').classList.remove('open'); }}

function planFromPopup() {{
  const s = _popupStationId ? allStations.find(x=>x.id===_popupStationId) : null;
  if (s) {{
    sessionStorage.setItem('plannerFrom', JSON.stringify({{id:s.id,name:s.name,x:s.x,y:s.y}}));
  }}
  window.location.href='planner.html';
}}

// ── SHEET DRAG ───────────────────────────────────────────
let _sheetDragging=false, _sheetStartY=0, _sheetExpanded=false;
const sheetEl=document.getElementById('sheet');
const handleEl=document.getElementById('sheetHandle');

handleEl.addEventListener('pointerdown',e=>{{
  _sheetDragging=true; _sheetStartY=e.clientY;
  e.currentTarget.setPointerCapture(e.pointerId);
}});
handleEl.addEventListener('pointermove',e=>{{
  if (!_sheetDragging) return;
  const dy=_sheetStartY - e.clientY;
  if (dy>30) {{ sheetEl.classList.add('expanded'); _sheetExpanded=true; }}
  else if (dy<-30) {{ sheetEl.classList.remove('expanded'); _sheetExpanded=false; }}
}});
handleEl.addEventListener('pointerup',()=>{{ _sheetDragging=false; }});
handleEl.addEventListener('click',()=>{{
  _sheetExpanded=!_sheetExpanded;
  sheetEl.classList.toggle('expanded',_sheetExpanded);
}});

// ── LOAD ──────────────────────────────────────────────────
async function loadAll() {{
  try {{
    const [lines,stations,streets,vehicles]=await Promise.all([
      apiFetch('/api/lines'), apiFetch('/api/stations'),
      apiFetch('/api/streets'), apiFetch('/api/live')
    ]);
    allLines={{}}; lines.forEach(l=>allLines[l.id]=l);
    allStations=stations; allStreets=streets; allVehicles=vehicles;
    allSegments=[];
    for (const line of lines) {{
      try {{ const d=await apiFetch(`/api/lines/${{encodeURIComponent(line.id)}}`); allSegments.push(...d.segments); }}
      catch {{}}
    }}
    engine.render();

    // Center on Union Station if it exists, else fit all
    const union=allStations.find(s=>s.name.toLowerCase().includes('union'));
    if (union) engine.centerOn(union.x,union.y,1.3);
    else fitAll();

    renderNearby();
  }} catch(e) {{
    document.getElementById('nearbyContent').innerHTML='<div class="empty">⚠️ Could not load network.<br><small>Check that the Worker is deployed and the DB binding is set.</small></div>';
  }}
}}

setInterval(async()=>{{ try{{ allVehicles=await apiFetch('/api/live'); engine.render(); }}catch{{}} }},15000);
loadAll();
</script>
</body>
</html>
