<div class="planner-wrap">
  <!-- INPUTS -->
  <div class="planner-top" id="plannerTop">
    <div class="planner-row">
      <div class="planner-dot" style="background:#34D399"></div>
      <input id="fromInput" placeholder="Current location" oninput="debounceSuggest('from',this.value)">
    </div>
    <div class="planner-row">
      <div class="planner-dot" style="background:white;border:2px solid rgba(255,255,255,.4)"></div>
      <input id="toInput" placeholder="Where to?" oninput="debounceSuggest('to',this.value)">
    </div>
    <button class="swap-btn" onclick="swapInputs()" title="Swap">⇅</button>
  </div>

  <!-- SUGGESTIONS DROPDOWN -->
  <div id="suggestions" style="background:white;z-index:200;border-bottom:1px solid #E5E7EB;display:none;max-height:200px;overflow-y:auto;"></div>

  <!-- MINI MAP -->
  <div class="map-mini" id="miniMap"></div>

  <!-- RESULTS -->
  <div class="results-panel" id="resultsPanel">
    <div class="empty" style="padding:2rem">
      <span style="font-size:2rem">🔍</span>
      <span>Enter a destination to see route options</span>
    </div>
  </div>
</div>

<!-- DETAIL PANEL (journey steps) -->
<div class="detail-panel" id="detailPanel">
  <div class="jhead" id="jhead" style="position:relative">
    <button class="detail-back" onclick="closeDetail()">←</button>
    <div style="height:36px"></div>
    <div class="jhead-times" id="jheadTimes"></div>
    <div><span class="jhead-dur" id="jheadDur"></span></div>
  </div>
  <div class="time-scroll" id="timeScroll"></div>
  <div style="padding:.75rem 1rem;background:#F8FAFC;border-bottom:1px solid #E5E7EB;">
    <div style="font-size:.7rem;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:.06em">Route</div>
  </div>
  <div class="timeline" id="timeline"></div>
  <div style="padding:1rem">
    <button onclick="saveCurrentJourney()" style="width:100%;padding:.8rem;border-radius:var(--r-xs);border:2px solid var(--black);background:none;font-size:.9rem;font-weight:700;">💾 Save this journey</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="shared.js"></script>
<script>
setActiveNav('planner');
initLoginForms();

let map, fromPos=null, toPos=null, fromName='', toName='';
let activeField='to', suggestTimer=null;
let allStations=[], allLines={};
let currentOptions=[];
let currentDetail=null;

// ── MINI MAP ──────────────────────────────────────────
map = L.map('miniMap', {zoomControl:false,attributionControl:false}).setView([40.7128,-74.006],12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

// ── LOAD DATA ────────────────────────────────────────
async function loadData() {
  try {
    allStations = await apiFetch('/api/stations');
    const linesArr = await apiFetch('/api/lines');
    linesArr.forEach(l => allLines[l.id] = l);
    renderLineGeometry();
  } catch { /* silent */ }
}

function renderLineGeometry() {
  Object.values(allLines).forEach(async line => {
    try {
      const data = await apiFetch(`/api/lines/${encodeURIComponent(line.id)}`);
      data.paths.forEach(seg => {
        const coords = JSON.parse(seg.latlngs_json);
        if (coords.length>1) L.polyline(coords,{color:line.color,weight:line.type==='rail'?5:4,opacity:.8}).addTo(map);
      });
    } catch {}
  });
}

// ── GEOLOCATION ──────────────────────────────────────
navigator.geolocation?.getCurrentPosition(pos => {
  fromPos = {lat:pos.coords.latitude, lng:pos.coords.longitude};
  fromName = 'Current location';
  document.getElementById('fromInput').value = 'Current location';
  map.setView([fromPos.lat,fromPos.lng],13);
  L.circleMarker([fromPos.lat,fromPos.lng],{radius:8,fillColor:'#2563EB',fillOpacity:1,color:'white',weight:3}).addTo(map);
});

// ── SUGGESTIONS ──────────────────────────────────────
function debounceSuggest(field, query) {
  activeField = field;
  clearTimeout(suggestTimer);
  if (query.length < 2) { hideSuggestions(); return; }
  suggestTimer = setTimeout(() => showSuggestions(query), 200);
}

function showSuggestions(query) {
  const q = query.toLowerCase();
  const matches = allStations.filter(s => s.name.toLowerCase().includes(q)).slice(0,8);
  const el = document.getElementById('suggestions');
  if (!matches.length) { hideSuggestions(); return; }
  el.style.display='block';
  el.innerHTML = matches.map(s => `
    <div style="padding:.75rem 1rem;cursor:pointer;border-bottom:1px solid #F3F4F6;display:flex;align-items:center;gap:.75rem"
         onmousedown="selectStation(${JSON.stringify(s).replace(/"/g,'&quot;')},'${activeField}')">
      <span style="font-size:1rem">📍</span>
      <div>
        <div style="font-weight:700;font-size:.9rem">${s.name}</div>
        <div style="font-size:.75rem;color:var(--gray)">${s.address||'Station'}</div>
      </div>
    </div>
  `).join('');
}

function hideSuggestions() {
  document.getElementById('suggestions').style.display='none';
}

function selectStation(s, field) {
  hideSuggestions();
  if (field==='from') {
    fromPos={lat:s.lat,lng:s.lng}; fromName=s.name;
    document.getElementById('fromInput').value=s.name;
  } else {
    toPos={lat:s.lat,lng:s.lng}; toName=s.name;
    document.getElementById('toInput').value=s.name;
  }
  if (fromPos && toPos) planTrip();
}

// ── SWAP ─────────────────────────────────────────────
function swapInputs() {
  [fromPos,toPos]=[toPos,fromPos];
  [fromName,toName]=[toName,fromName];
  document.getElementById('fromInput').value=fromName;
  document.getElementById('toInput').value=toName;
  if (fromPos && toPos) planTrip();
}

// ── PLAN TRIP ────────────────────────────────────────
async function planTrip() {
  if (!fromPos||!toPos) return;
  const panel = document.getElementById('resultsPanel');
  panel.innerHTML='<div class="empty"><div class="spinner"></div><span>Finding routes…</span></div>';

  // Update map
  map.eachLayer(l => { if (l._fromMarker) l.remove(); });
  const fm = L.marker([fromPos.lat,fromPos.lng]).addTo(map); fm._fromMarker=true;
  const tm = L.marker([toPos.lat,toPos.lng]).addTo(map); tm._fromMarker=true;
  map.fitBounds([[fromPos.lat,fromPos.lng],[toPos.lat,toPos.lng]],{padding:[40,40]});

  try {
    const data = await apiFetch(
      `/api/plan?from_lat=${fromPos.lat}&from_lng=${fromPos.lng}&to_lat=${toPos.lat}&to_lng=${toPos.lng}`
    );

    if (!data.options?.length) {
      panel.innerHTML='<div class="empty"><span style="font-size:1.5rem">😕</span><span>No direct routes found between these points.</span></div>';
      return;
    }

    currentOptions = data.options;

    panel.innerHTML = `
      <div style="padding:.85rem 1rem;border-bottom:1px solid #E5E7EB">
        <div style="font-size:.7rem;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:.06em">Route options</div>
      </div>
      ${data.options.map((opt,i) => renderOption(opt,i)).join('')}
    `;
  } catch(e) {
    panel.innerHTML=`<div class="empty">⚠️ ${e.message}</div>`;
  }
}

function renderOption(opt, idx) {
  const line = opt.line;
  const walkFrom = opt.from_station ? haversine(fromPos.lat,fromPos.lng,opt.from_station.lat,opt.from_station.lng) : 0;
  const walkTo = opt.to_station ? haversine(toPos.lat,toPos.lng,opt.to_station.lat,opt.to_station.lng) : 0;
  const walkMin = walkMinutes(walkFrom) + walkMinutes(walkTo);
  const totalMin = walkMin + 15; // approximate transit time

  return `
    <div class="route-opt" onclick="showDetail(${idx})">
      <div style="width:52px;height:52px;border-radius:12px;background:${line.color};display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:900;color:${line.text_color};flex-shrink:0">${line.id}</div>
      <div class="route-opt-left">
        <div class="route-chips">
          <span class="chip" style="background:${line.color};color:${line.text_color}">${line.id}</span>
          ${walkFrom>0.05 ? `<span class="walk-tag">🚶 ${walkMinutes(walkFrom)} min walk</span>` : ''}
        </div>
        <div style="display:flex;align-items:baseline;gap:.4rem">
          <span class="route-go">${line.frequency||'See schedule'}</span>
        </div>
        <div style="font-size:.78rem;color:var(--gray);margin-top:2px">${opt.from_station?.name||''} → ${opt.to_station?.name||''}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:1.6rem;font-weight:900;color:var(--black);line-height:1">${totalMin}</div>
        <div style="font-size:.72rem;color:var(--gray);font-weight:600">min</div>
      </div>
    </div>
  `;
}

// ── DETAIL PANEL ─────────────────────────────────────
async function showDetail(idx) {
  const opt = currentOptions[idx];
  currentDetail = opt;
  const line = opt.line;

  const jhead = document.getElementById('jhead');
  jhead.style.background = line.color;
  jhead.style.color = line.text_color;

  const now = new Date();
  const dep = new Date(now.getTime() + 5*60000);
  const arr = new Date(dep.getTime() + 22*60000);
  document.getElementById('jheadTimes').textContent =
    `Leave at ${dep.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} · Arrive ${arr.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
  document.getElementById('jheadDur').textContent = '27 min';

  // Time chips
  const timeScroll = document.getElementById('timeScroll');
  timeScroll.innerHTML = [5,12,22,35].map((t,i) => `
    <div class="time-chip ${i===0?'active':''}" onclick="selectChip(this,${t})">
      <div class="time-chip-label">${i===0?'HURRY':i===3?'SCHEDULE':'NEXT'}</div>
      <div class="time-chip-num">${t}</div>
      <div class="time-chip-lbl">minutes</div>
    </div>
  `).join('');

  // Timeline
  const walkFrom = opt.from_station ? haversine(fromPos.lat,fromPos.lng,opt.from_station.lat,opt.from_station.lng) : 0;
  const walkTo = opt.to_station ? haversine(toPos.lat,toPos.lng,opt.to_station.lat,opt.to_station.lng) : 0;
  const fromStation = opt.from_station;
  const toStation = opt.to_station;

  let stops = [];
  try {
    const stData = await apiFetch(`/api/lines/${encodeURIComponent(line.id)}`);
    stops = stData.stations.filter(s => s.direction === 'outbound' || s.direction === 'both').slice(0,12);
  } catch {}

  const tl = document.getElementById('timeline');
  let html = '';

  // Walk to station
  if (walkFrom>0.05) {
    html += `<div style="padding:.4rem 0"><span class="walk-tag">🚶 Walk ${walkMinutes(walkFrom)} min to ${fromStation?.name||'stop'}</span></div>`;
  }

  // Boarding station
  html += timelineRow(fromStation?.name||'Board here', dep.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), true, line.color, true);

  // Intermediate stops
  const baseTime = dep.getTime();
  stops.forEach((s,i) => {
    if (s.id === fromStation?.id || s.id === toStation?.id) return;
    const t = new Date(baseTime + (i+1)*3*60000);
    html += timelineRow(s.name, t.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), false, line.color, false);
  });

  // Destination
  html += timelineRow(toStation?.name||toName||'Destination', arr.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), true, line.color, true);

  if (walkTo>0.05) {
    html += `<div style="padding:.4rem 0"><span class="walk-tag">🚶 Walk ${walkMinutes(walkTo)} min to destination</span></div>`;
  }

  tl.innerHTML = html;
  document.getElementById('detailPanel').classList.add('open');
}

function timelineRow(name, time, major, color, filled) {
  return `
    <div class="tl-row">
      <div class="tl-dots">
        <div class="tl-dot${filled?' filled':''}" style="border-color:${color};${filled?'background:'+color:''}"></div>
        <div class="tl-seg" style="background:${color}"></div>
      </div>
      <div class="tl-name${major?' bold':''}">${name}</div>
      <div class="tl-time">${time}</div>
    </div>
  `;
}

function selectChip(el, mins) {
  document.querySelectorAll('.time-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
}

// ── SAVE JOURNEY ─────────────────────────────────────
async function saveCurrentJourney() {
  if (!Auth.isLoggedIn()) {
    toast('Sign in to save journeys');
    toggleLogin();
    return;
  }
  if (!fromPos||!toPos) return;
  try {
    await apiFetch('/api/journeys', {
      method:'POST',
      body:JSON.stringify({from_name:fromName,to_name:toName,from_lat:fromPos.lat,from_lng:fromPos.lng,to_lat:toPos.lat,to_lng:toPos.lng})
    });
    toast('Journey saved ✓');
  } catch(e) { toast(e.message); }
}

// ── LOAD SAVED JOURNEY ───────────────────────────────
window.addEventListener('loadJourney', e => {
  const j = e.detail;
  fromPos={lat:j.from_lat,lng:j.from_lng}; fromName=j.from_name;
  toPos={lat:j.to_lat,lng:j.to_lng}; toName=j.to_name;
  document.getElementById('fromInput').value=fromName;
  document.getElementById('toInput').value=toName;
  planTrip();
});

const pending = sessionStorage.getItem('pendingJourney');
if (pending) {
  sessionStorage.removeItem('pendingJourney');
  const j = JSON.parse(pending);
  window.dispatchEvent(new CustomEvent('loadJourney',{detail:j}));
}

// ── URL PARAMS ────────────────────────────────────────
const urlLine = new URLSearchParams(location.search).get('line');
if (urlLine) {
  document.getElementById('toInput').focus();
}

document.addEventListener('click', e => {
  if (!e.target.closest('#suggestions') && !e.target.closest('#fromInput') && !e.target.closest('#toInput')) hideSuggestions();
});

loadData();
</script>
