<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Plan a Trip — City Metro</title>
<link rel="stylesheet" href="style.css">
<style>
body {{ overflow: hidden; }}

/* ── Screen 1 wrapper ── */
.planner-wrap {{
  margin-top: var(--nav-h);
  display: flex; flex-direction: column;
  height: calc(100vh - var(--nav-h)); overflow: hidden;
}}
.mini-canvas-wrap {{
  height: 190px; flex-shrink: 0; position: relative;
  overflow: hidden; background: var(--canvas-bg); touch-action: none;
}}
#miniCanvas {{ position: absolute; top: 0; left: 0; transform-origin: 0 0; }}
.results-panel {{ flex: 1; overflow-y: auto; background: #111827; }}

/* Route list (Screen 1, dark bg like screenshot 2) */
.route-section-label {{
  font-size: .65rem; font-weight: 800; letter-spacing: .1em;
  color: rgba(255,255,255,.35); text-transform: uppercase;
  padding: .85rem 1.25rem .4rem;
}}
.route-option {{
  display: flex; align-items: center; gap: 1rem;
  padding: .95rem 1.25rem;
  border-bottom: 1px solid rgba(255,255,255,.07);
  cursor: pointer; transition: background .12s;
}}
.route-option:hover {{ background: rgba(255,255,255,.05); }}
.route-option-badge {{
  border-radius: 12px; min-width: 110px; height: 52px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.25rem; font-weight: 900; flex-shrink: 0;
}}
.route-option-info {{ flex: 1; }}
.route-go-time {{ font-size: 1rem; font-weight: 800; color: #34D399; display: flex; align-items: center; gap: .4rem; }}
.route-total-time {{ font-size: .82rem; color: rgba(255,255,255,.55); margin-top: 2px; }}
.route-option-right {{ text-align: right; flex-shrink: 0; }}
.route-mins-big {{ font-size: 1.8rem; font-weight: 900; color: white; line-height: 1; }}
.route-mins-label {{ font-size: .65rem; color: rgba(255,255,255,.45); font-weight: 600; }}
.no-routes {{
  color: rgba(255,255,255,.4); text-align: center;
  padding: 3rem 1.5rem; font-size: .95rem; line-height: 1.6;
}}

/* ── Screen 2: Route overview ── */
.route-overview-panel {{
  position: fixed; inset: 0; margin-top: var(--nav-h);
  background: var(--white); z-index: 1600;
  transform: translateX(100%); transition: .3s cubic-bezier(.4,0,.2,1);
  display: flex; flex-direction: column; overflow: hidden;
}}
.route-overview-panel.open {{ transform: translateX(0); }}
.rop-header {{ color: white; padding: 1.1rem 1.1rem .85rem; position: relative; flex-shrink: 0; }}
.rop-back {{
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(255,255,255,.2); border: none; color: white;
  font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
  margin-bottom: .65rem; cursor: pointer;
}}
.rop-times {{ font-size: 1.2rem; font-weight: 800; margin-bottom: .3rem; }}
.rop-dur-pill {{
  display: inline-block; background: rgba(255,255,255,.18);
  padding: .2rem .8rem; border-radius: 999px; font-size: .875rem; font-weight: 700;
}}
.rop-go-btn {{
  position: absolute; top: 1rem; right: 1rem;
  background: white; border: none; border-radius: var(--r-xs);
  width: 64px; height: 42px; font-size: 1rem; font-weight: 900;
  cursor: pointer; transition: opacity .15s;
}}
.rop-go-btn:hover {{ opacity: .85; }}

/* Departure chips */
.rop-chips-scroll {{
  flex-shrink: 0; display: flex; gap: .65rem; overflow-x: auto;
  padding: .85rem 1rem; scrollbar-width: none;
  border-bottom: 3px solid var(--gray-light);
}}
.rop-chips-scroll::-webkit-scrollbar {{ display: none; }}
.dep-chip {{
  flex-shrink: 0; border-radius: var(--r-sm); padding: .75rem 1rem;
  text-align: center; min-width: 88px;
  border: 2px solid var(--border); cursor: pointer; transition: .15s;
  background: var(--white);
}}
.dep-chip.live {{
  border-color: var(--blue); background: var(--blue-l);
}}
.dep-chip-num {{
  font-size: 1.8rem; font-weight: 900; line-height: 1;
  color: var(--blue);
}}
.dep-chip.live .dep-chip-num {{ color: var(--blue); }}
.dep-chip-label {{ font-size: .65rem; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: .04em; margin-bottom: .2rem; }}
.dep-chip-unit {{ font-size: .7rem; color: var(--gray); font-weight: 600; margin-top: 2px; }}
.dep-chip-badge {{
  font-size: .6rem; font-weight: 800; text-transform: uppercase; letter-spacing: .05em;
  background: var(--gray-light); color: var(--gray); padding: .15rem .45rem;
  border-radius: 999px; margin-top: 3px; display: inline-block;
}}

/* Route overview map */
.rop-map-wrap {{
  height: 180px; flex-shrink: 0; position: relative;
  overflow: hidden; background: var(--canvas-bg); touch-action: none;
}}
#ropCanvas {{ position: absolute; top: 0; left: 0; transform-origin: 0 0; }}

/* Stop list inside overview */
.rop-body {{ flex: 1; overflow-y: auto; }}
.rop-leg {{ border-bottom: 4px solid var(--gray-light); }}
.rop-leg-header {{
  display: flex; align-items: center; gap: .85rem; padding: .95rem 1rem .75rem;
}}
.rop-leg-badge {{
  width: 44px; height: 44px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; font-weight: 900; flex-shrink: 0;
}}
.rop-leg-name {{ font-size: .95rem; font-weight: 800; }}
.rop-leg-toward {{ font-size: .75rem; color: var(--gray); margin-top: 2px; }}
.rop-leg-time {{ margin-left: auto; text-align: right; flex-shrink: 0; }}
.rop-leg-time-val {{ font-size: 1rem; font-weight: 800; }}
.rop-leg-time-lbl {{ font-size: .65rem; color: var(--gray); font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }}
.stop-row {{
  display: flex; align-items: flex-start; gap: .85rem;
  padding: .45rem 1rem;
}}
.stop-dot-col {{
  display: flex; flex-direction: column; align-items: center;
  width: 16px; flex-shrink: 0; margin-top: 4px;
}}
.stop-dot {{
  width: 12px; height: 12px; border-radius: 50%;
  border: 3px solid currentColor; background: white; flex-shrink: 0;
}}
.stop-dot.major {{ background: currentColor; width: 14px; height: 14px; }}
.stop-seg {{ width: 3px; flex: 1; min-height: 18px; margin-top: 1px; }}
.stop-name {{ flex: 1; font-size: .9rem; font-weight: 500; padding-bottom: .4rem; }}
.stop-name.major {{ font-weight: 800; font-size: .95rem; }}
.stop-time {{ font-size: .82rem; color: var(--gray); padding-top: 2px; flex-shrink: 0; }}
.stops-collapsed {{
  margin: .1rem 1rem .1rem 2.85rem; font-size: .82rem;
  color: var(--gray); font-weight: 600; cursor: pointer;
  padding: .3rem 0; text-decoration: underline;
}}

/* Transfer badge between legs */
.transfer-banner {{
  display: flex; align-items: center; gap: .65rem;
  padding: .85rem 1rem;
  background: #FFFBEB; border-bottom: 1.5px solid #FDE68A;
  border-top: 1.5px solid #FDE68A;
}}
.transfer-label {{ font-size: .68rem; font-weight: 900; color: #92400E; text-transform: uppercase; letter-spacing: .05em; }}
.transfer-detail {{ font-size: .85rem; color: #78350F; }}

/* Walk tag */
.walk-tag {{
  display: inline-flex; align-items: center; gap: .4rem;
  background: var(--gray-light); border-radius: 999px;
  padding: .35rem .85rem; font-size: .82rem; font-weight: 700;
  color: var(--gray-dark); margin: .4rem 1rem;
}}

/* Advisory card */
.advisory-card {{
  margin: .5rem 1rem; border-radius: 10px; padding: .85rem;
  border: 1.5px solid var(--border);
}}
.advisory-icon {{ font-size: 1rem; margin-right: .4rem; }}
.advisory-title {{ font-size: .72rem; font-weight: 900; text-transform: uppercase; letter-spacing: .05em; margin-bottom: .3rem; }}
.advisory-body {{ font-size: .82rem; line-height: 1.45; color: var(--gray-dark); }}
.advisory-meta {{ font-size: .68rem; color: var(--gray); margin-top: .35rem; }}

/* ── Screen 3: Active navigation ── */
.nav-panel {{
  position: fixed; inset: 0; margin-top: var(--nav-h);
  background: var(--white); z-index: 1700;
  transform: translateX(100%); transition: .3s cubic-bezier(.4,0,.2,1);
  display: flex; flex-direction: column; overflow: hidden;
}}
.nav-panel.open {{ transform: translateX(0); }}
.nav-header {{ padding: 1.1rem 1.1rem .85rem; color: white; flex-shrink: 0; position: relative; }}
.nav-close {{
  position: absolute; top: 1rem; right: 1rem;
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(255,255,255,.22); border: none; color: white; font-size: 1.1rem;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
}}
.nav-title {{ font-size: 1.25rem; font-weight: 900; margin-bottom: .25rem; }}
.nav-subtitle {{ font-size: .85rem; opacity: .8; }}
.nav-steps {{ flex: 1; overflow-y: auto; padding-bottom: 2rem; }}
.step-controls {{
  flex-shrink: 0; display: flex; align-items: center; gap: .6rem;
  padding: .85rem 1rem; border-top: 1.5px solid var(--border);
  background: white; position: sticky; bottom: 0;
}}
.step-btn-back {{
  padding: .7rem 1rem; border-radius: var(--r-xs);
  background: none; border: 2px solid var(--border);
  color: var(--gray-dark); font-size: .9rem; font-weight: 700; font-family: inherit;
}}
.step-btn-back:disabled {{ opacity: .4; cursor: not-allowed; }}
.step-btn-next {{
  flex: 1; padding: .75rem; border-radius: var(--r-xs);
  background: var(--black); color: white;
  font-size: .9rem; font-weight: 700; border: none; font-family: inherit;
}}
.step-btn-next.end {{ background: var(--green); }}
.step-progress {{ font-size: .78rem; color: var(--gray); font-weight: 700; white-space: nowrap; }}

/* Arrival-style card used inside nav steps */
.nav-step-card {{
  display: flex; align-items: center; padding: 1rem 1.1rem; gap: .85rem;
  cursor: pointer; border-bottom: 1.5px solid rgba(255,255,255,.12);
}}
.nav-step-badge {{
  width: 46px; height: 46px; border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.15rem; font-weight: 900; flex-shrink: 0;
  background: rgba(255,255,255,.2); border: 2px solid rgba(255,255,255,.3);
}}
.nav-step-main {{ flex: 1; min-width: 0; }}
.nav-step-title {{ font-size: 1rem; font-weight: 800; }}
.nav-step-sub {{ font-size: .75rem; opacity: .75; margin-top: 2px; }}
.nav-step-eta {{ text-align: right; flex-shrink: 0; }}
.nav-step-num {{ font-size: 2rem; font-weight: 900; line-height: 1; }}
.nav-step-unit {{ font-size: .65rem; opacity: .75; font-weight: 600; }}

/* picker */
.picker-overlay {{ display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:2500;align-items:flex-end; }}
.picker-overlay.open {{ display:flex; }}
.picker-card {{ background:white;border-radius:var(--r) var(--r) 0 0;width:100%;max-height:75vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow-lg);animation:slideUp .22s ease; }}
@keyframes slideUp {{ from {{ transform:translateY(30px);opacity:0; }} to {{ transform:translateY(0);opacity:1; }} }}
.picker-header {{ padding:.75rem 1rem .5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between; }}
.picker-header h3 {{ font-size:1rem;font-weight:800; }}
.picker-close {{ width:32px;height:32px;border-radius:50%;background:var(--gray-light);border:none;font-size:1rem;display:flex;align-items:center;justify-content:center; }}
.picker-search {{ padding:.75rem 1rem;border-bottom:1px solid var(--border); }}
.picker-search input {{ width:100%;padding:.65rem .9rem;border:2px solid var(--border);border-radius:var(--r-xs);font-size:.95rem;outline:none;font-family:inherit; }}
.picker-search input:focus {{ border-color:var(--black); }}
.picker-list {{ overflow-y:auto;flex:1; }}
.picker-item {{ display:flex;align-items:center;gap:.75rem;padding:.85rem 1rem;cursor:pointer;border-bottom:1px solid var(--gray-light); }}
.picker-item:hover {{ background:var(--gray-light); }}
</style>
</head>
<body>

{nav_login}

<!-- ── SCREEN 1: Route selection ─────────────────────── -->
<div class="planner-wrap">
  <div class="planner-top">
    <div class="planner-row" onclick="openPicker('from')">
      <div class="planner-dot" style="background:#34D399"></div>
      <span class="ptxt placeholder" id="fromLabel">Choose origin station</span>
    </div>
    <div class="planner-row" onclick="openPicker('to')">
      <div class="planner-dot" style="background:white;border:2px solid rgba(255,255,255,.4)"></div>
      <span class="ptxt placeholder" id="toLabel">Where to?</span>
    </div>
    <button class="swap-btn" onclick="swapStations()">⇅</button>
  </div>
  <div class="mini-canvas-wrap" id="miniWrap">
    <canvas id="miniCanvas"></canvas>
  </div>
  <div class="results-panel" id="resultsPanel">
    <div class="no-routes">Choose an origin and destination to see route options</div>
  </div>
</div>

<!-- ── SCREEN 2: Route overview ───────────────────────── -->
<div class="route-overview-panel" id="ropPanel">
  <div class="rop-header" id="ropHeader">
    <button class="rop-back" onclick="closeRouteOverview()">←</button>
    <div class="rop-times" id="ropTimes"></div>
    <span class="rop-dur-pill" id="ropDur"></span>
    <button class="rop-go-btn" id="ropGoBtn" onclick="startNavigation()">GO</button>
  </div>
  <div class="rop-chips-scroll" id="ropChips"></div>
  <div class="rop-map-wrap" id="ropMapWrap">
    <canvas id="ropCanvas"></canvas>
  </div>
  <div class="rop-body" id="ropBody"></div>
</div>

<!-- ── SCREEN 3: Active navigation ────────────────────── -->
<div class="nav-panel" id="navPanel">
  <div class="nav-header" id="navHeader">
    <button class="nav-close" onclick="endNavigation()">✕</button>
    <div class="nav-title" id="navTitle"></div>
    <div class="nav-subtitle" id="navSubtitle"></div>
  </div>
  <div class="nav-steps" id="navSteps"></div>
  <div class="step-controls">
    <button class="step-btn-back" id="stepBack" onclick="stepPrev()" disabled>← Back</button>
    <span class="step-progress" id="stepProgress">1 / 1</span>
    <button class="step-btn-next" id="stepNext" onclick="stepNext()">Next →</button>
  </div>
</div>

<!-- ── STATION PICKER ──────────────────────────────────── -->
<div class="picker-overlay" id="pickerOverlay">
  <div class="picker-card">
    <div class="picker-header">
      <h3 id="pickerTitle">Choose station</h3>
      <button class="picker-close" onclick="closePicker()">✕</button>
    </div>
    <div class="picker-search">
      <input type="text" id="pickerSearch" placeholder="Search stations…" oninput="filterPicker(this.value)">
    </div>
    <div class="picker-list" id="pickerList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
setActiveNav('planner');
initLoginForms();

// ── STATE ─────────────────────────────────────────────────
let allStations = [], allLines = {{}}, allSegments = [], allVehicles = [];
let fromStation = null, toStation = null;
let pickerTarget = 'to';
let currentPlanData = null;  // full plan response
let currentLegs = null;      // legs for selected route option
let navStepIndex = 0;
let ropEngine = null, miniEngine = null;

// ── MINI-MAP ENGINE ──────────────────────────────────────
miniEngine = new CanvasEngine('miniWrap','miniCanvas', {{
  scale:.4, minScale:.1, maxScale:3,
  worldW:6000, worldH:6000, gridSize:100,
  onDraw: drawMini
}});
miniEngine.render();

function drawMini(ctx) {{
  allSegments.forEach(seg => {{
    const line = allLines[seg.line_id]; if (!line) return;
    const pts = JSON.parse(seg.points_json); if (pts.length<2) return;
    ctx.strokeStyle = line.color;
    ctx.lineWidth = line.type==='rail' ? 5 : 3.5;
    ctx.lineCap='round'; ctx.lineJoin='round'; ctx.globalAlpha=.85;
    ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
    pts.slice(1).forEach(p=>ctx.lineTo(p[0],p[1]));
    ctx.stroke(); ctx.globalAlpha=1;
  }});
  // Highlight journey route if a plan is selected
  if (currentLegs) {{
    currentLegs.forEach(leg => {{
      const segs = allSegments.filter(s => s.line_id === leg.line.id);
      segs.forEach(seg => {{
        const pts = JSON.parse(seg.points_json); if (pts.length<2) return;
        ctx.strokeStyle = leg.line.color;
        ctx.lineWidth = leg.line.type==='rail' ? 8 : 6;
        ctx.lineCap='round'; ctx.lineJoin='round';
        ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
        pts.slice(1).forEach(p=>ctx.lineTo(p[0],p[1]));
        ctx.stroke();
      }});
    }});
  }}
  // Draw stations
  allStations.forEach(s => {{
    const lineIds = (s.line_ids||'').split(',').filter(Boolean);
    const col = allLines[lineIds[0]]?.color || '#6B7280';
    const isSel = (fromStation&&s.id===fromStation.id)||(toStation&&s.id===toStation.id);
    ctx.beginPath(); ctx.arc(s.x,s.y,isSel?12:6,0,Math.PI*2);
    ctx.fillStyle = isSel ? (fromStation&&s.id===fromStation.id ? '#34D399' : '#1D4ED8') : col;
    ctx.fill(); ctx.strokeStyle='white'; ctx.lineWidth=2.5; ctx.stroke();
  }});
}}

// ── ROP MAP ENGINE ───────────────────────────────────────
function initRopEngine() {{
  if (ropEngine) return;
  ropEngine = new CanvasEngine('ropMapWrap','ropCanvas', {{
    scale:.4, minScale:.1, maxScale:3,
    worldW:6000, worldH:6000, gridSize:100,
    onDraw: drawRop
  }});
  ropEngine.render();
}}

function drawRop(ctx) {{
  // All lines faint
  allSegments.forEach(seg => {{
    const line = allLines[seg.line_id]; if (!line) return;
    const pts = JSON.parse(seg.points_json); if (pts.length<2) return;
    ctx.strokeStyle = line.color; ctx.lineWidth = line.type==='rail'?4:3;
    ctx.lineCap='round'; ctx.lineJoin='round'; ctx.globalAlpha=.2;
    ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
    pts.slice(1).forEach(p=>ctx.lineTo(p[0],p[1]));
    ctx.stroke(); ctx.globalAlpha=1;
  }});
  if (!currentLegs) return;
  // Route highlighted
  currentLegs.forEach(leg => {{
    const segs = allSegments.filter(s => s.line_id === leg.line.id);
    segs.forEach(seg => {{
      const pts = JSON.parse(seg.points_json); if (pts.length<2) return;
      ctx.strokeStyle = leg.line.color;
      ctx.lineWidth = leg.line.type==='rail' ? 7 : 5;
      ctx.lineCap='round'; ctx.lineJoin='round';
      ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
      pts.slice(1).forEach(p=>ctx.lineTo(p[0],p[1]));
      ctx.stroke();
    }});
    // Station dots
    leg.stations.forEach(s => {{
      ctx.beginPath(); ctx.arc(s.x,s.y,7,0,Math.PI*2);
      ctx.fillStyle = leg.line.color; ctx.fill();
      ctx.strokeStyle='white'; ctx.lineWidth=2.5; ctx.stroke();
    }});
  }});
  // Live vehicles on these lines
  const journeyLineIds = new Set(currentLegs.map(l=>l.line.id));
  allVehicles.forEach(v => {{
    if (!journeyLineIds.has(v.line_id)) return;
    ctx.save(); ctx.translate(v.x,v.y); ctx.scale(1/ropEngine.scale,1/ropEngine.scale);
    drawVehicleMarker(ctx,0,0,v.line_type,14);
    ctx.restore();
  }});
}}

// ── DATA LOADING ─────────────────────────────────────────
async function loadData() {{
  try {{
    const [lines, stations, vehicles] = await Promise.all([
      apiFetch('/api/lines'), apiFetch('/api/stations'), apiFetch('/api/live')
    ]);
    allLines = {{}}; lines.forEach(l=>allLines[l.id]=l);
    allStations = stations;
    allVehicles = vehicles;
    allSegments = [];
    for (const line of lines) {{
      try {{ const d=await apiFetch(`/api/lines/${{encodeURIComponent(line.id)}}`); allSegments.push(...d.segments); }} catch {{}}
    }}
    miniEngine.render();
    const pts = allStations.map(s=>[s.x,s.y]);
    allSegments.forEach(seg=>{{ try{{JSON.parse(seg.points_json).forEach(p=>pts.push(p));}}catch{{}} }});
    if (pts.length) miniEngine.fitToContent(pts);

    // Handle pending journey from saved journeys
    const pending = sessionStorage.getItem('pendingJourney');
    if (pending) {{
      sessionStorage.removeItem('pendingJourney');
      const j = JSON.parse(pending);
      applyJourney(j.from_station_id, j.to_station_id);
    }}
    // Handle plan-from-popup
    const plannerFrom = sessionStorage.getItem('plannerFrom');
    if (plannerFrom) {{
      sessionStorage.removeItem('plannerFrom');
      const s = JSON.parse(plannerFrom);
      const found = allStations.find(x=>x.id===s.id);
      if (found) {{
        fromStation=found;
        document.getElementById('fromLabel').textContent=found.name;
        document.getElementById('fromLabel').classList.remove('placeholder');
      }}
    }}
  }} catch(e) {{ console.error(e); }}
}}
window.addEventListener('loadJourney', e => applyJourney(e.detail.from_station_id, e.detail.to_station_id));

function applyJourney(fromId, toId) {{
  const f=allStations.find(s=>s.id===fromId), t=allStations.find(s=>s.id===toId);
  if(f){{ fromStation=f; document.getElementById('fromLabel').textContent=f.name; document.getElementById('fromLabel').classList.remove('placeholder'); }}
  if(t){{ toStation=t; document.getElementById('toLabel').textContent=t.name; document.getElementById('toLabel').classList.remove('placeholder'); }}
  miniEngine.render();
  if(fromStation&&toStation) planTrip();
}}

// ── PICKER ────────────────────────────────────────────────
function openPicker(target) {{
  pickerTarget = target;
  document.getElementById('pickerTitle').textContent = target==='from' ? 'Choose origin' : 'Choose destination';
  document.getElementById('pickerSearch').value = '';
  renderPickerList(allStations);
  document.getElementById('pickerOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('pickerSearch').focus(), 80);
}}
function closePicker() {{ document.getElementById('pickerOverlay').classList.remove('open'); }}

function filterPicker(q) {{
  q = q.toLowerCase();
  renderPickerList(allStations.filter(s=>s.name.toLowerCase().includes(q)));
}}
function renderPickerList(stations) {{
  const list = document.getElementById('pickerList');
  if (!stations.length) {{ list.innerHTML='<div class="empty" style="padding:1.5rem">No stations found</div>'; return; }}
  list.innerHTML = stations.map(s => {{
    const lineIds = (s.line_ids||'').split(',').filter(Boolean);
    const chips = lineIds.map(id => {{
      const l=allLines[id]; if(!l) return '';
      return `<span class="chip-sm" style="background:${{l.color}};color:${{l.text_color}}">${{l.id}}</span>`;
    }}).join('');
    return `<div class="picker-item" onclick="selectStation(${{s.id}})">
      <span style="font-size:1.1rem">${{s.type==='hub'?'🔀':s.type==='station'?'🚆':'📍'}}</span>
      <div style="flex:1">
        <div style="font-weight:700;font-size:.9rem">${{escapeHtml(s.name)}}</div>
        <div style="display:flex;gap:3px;margin-top:3px">${{chips}}</div>
      </div>
    </div>`;
  }}).join('');
}}
function selectStation(id) {{
  const s=allStations.find(x=>x.id===id); if(!s) return;
  closePicker();
  if (pickerTarget==='from') {{
    fromStation=s;
    document.getElementById('fromLabel').textContent=s.name;
    document.getElementById('fromLabel').classList.remove('placeholder');
  }} else {{
    toStation=s;
    document.getElementById('toLabel').textContent=s.name;
    document.getElementById('toLabel').classList.remove('placeholder');
  }}
  miniEngine.render();
  if (fromStation&&toStation) planTrip();
}}
document.getElementById('pickerOverlay').addEventListener('click', e => {{
  if (e.target===e.currentTarget) closePicker();
}});

function swapStations() {{
  [fromStation,toStation]=[toStation,fromStation];
  document.getElementById('fromLabel').textContent=fromStation?fromStation.name:'Choose origin station';
  document.getElementById('fromLabel').classList.toggle('placeholder',!fromStation);
  document.getElementById('toLabel').textContent=toStation?toStation.name:'Where to?';
  document.getElementById('toLabel').classList.toggle('placeholder',!toStation);
  miniEngine.render();
  if (fromStation&&toStation) planTrip();
}}

// ── SCREEN 1: PLAN TRIP ───────────────────────────────────
async function planTrip() {{
  const panel = document.getElementById('resultsPanel');
  panel.innerHTML = '<div class="no-routes"><div class="spinner" style="margin:0 auto .75rem"></div>Finding routes…</div>';
  try {{
    const data = await apiFetch(`/api/plan?from_station=${{fromStation.id}}&to_station=${{toStation.id}}`);
    currentPlanData = data;
    if (!data.found || !data.legs.length) {{
      panel.innerHTML = `<div class="no-routes">No connected route found between<br><strong>${{escapeHtml(fromStation.name)}}</strong> and <strong>${{escapeHtml(toStation.name)}}</strong>.<br><small>Make sure lines are drawn between these stations in the editor.</small></div>`;
      return;
    }}
    renderRouteList([data]);
  }} catch(e) {{
    panel.innerHTML = `<div class="no-routes">⚠️ ${{e.message}}</div>`;
  }}
}}

function renderRouteList(plans) {{
  const panel = document.getElementById('resultsPanel');
  const now = new Date();

  // Calculate "go in X min" from live vehicles
  function getGoInMins(legs) {{
    const firstLeg = legs[0];
    const boardStation = firstLeg.stations[0];
    const liveVehicle = allVehicles.find(v=>v.line_id===firstLeg.line.id && v.next_x!=null);
    if (liveVehicle) {{
      const dist = Math.hypot(liveVehicle.next_x-liveVehicle.x, liveVehicle.next_y-liveVehicle.y);
      const eta = etaMinutesFromSpeed(dist, liveVehicle.speed_kmh);
      if (eta) return eta;
    }}
    // Fallback: parse frequency
    const freq = firstLeg.line.frequency || '';
    const m = freq.match(/(\\d+)/);
    return m ? Math.floor(parseInt(m[1])/2) : null;
  }}

  const html = plans.map((data, idx) => {{
    const legs = data.legs;
    const totalMin = Math.round(data.totalSeconds / 60);
    const goIn = getGoInMins(legs);
    const firstLine = legs[0].line;

    // Build badge — shows all line IDs if multi-leg
    const badgeIds = legs.map(l=>l.line.id).join(' → ');
    const transfers = data.transfers;

    return `<div class="route-option" onclick="showRouteOverview(${{idx}})">
      <div class="route-option-badge" style="background:${{firstLine.color}};color:${{firstLine.text_color}}">
        ${{legs.length===1 ? legs[0].line.id : legs.map(l=>`<span style="margin:0 2px">${{l.line.id}}</span>`).join('→')}}
      </div>
      <div class="route-option-info">
        <div class="route-go-time">
          ${{goIn!=null ? `Go in ${{goIn}} min` : legs[0].line.name}}
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M8.111 16.404a5.5 5.5 0 0 1 7.778 0M12 20h.01M4.929 7.929a10 10 0 0 1 14.142 0M6.34 10.66a8 8 0 0 1 11.32 0" stroke-linecap="round"/></svg>
        </div>
        <div class="route-total-time">
          ${{legs[0].stations[0]?.name||''}} → ${{legs[legs.length-1].stations[legs[legs.length-1].stations.length-1]?.name||''}}
        </div>
      </div>
      <div class="route-option-right">
        <div class="route-mins-big">${{totalMin}}</div>
        <div class="route-mins-label">min</div>
      </div>
    </div>`;
  }}).join('');

  panel.innerHTML = `<div class="route-section-label">Route options</div>${{html}}`;
}}

// ── SCREEN 2: ROUTE OVERVIEW ─────────────────────────────
async function showRouteOverview(planIdx) {{
  const data = currentPlanData;
  if (!data) return;
  currentLegs = data.legs;

  initRopEngine();

  const firstLine = currentLegs[0].line;
  const lastStation = currentLegs[currentLegs.length-1].stations[currentLegs[currentLegs.length-1].stations.length-1];
  const totalMin = Math.round(data.totalSeconds / 60);

  // Header
  const header = document.getElementById('ropHeader');
  header.style.background = firstLine.color;
  header.style.color = firstLine.text_color;
  const goBtn = document.getElementById('ropGoBtn');
  goBtn.style.color = firstLine.color;

  const now = new Date();
  const dep = new Date(now.getTime() + 3*60000);
  const arr = new Date(dep.getTime() + data.totalSeconds*1000);
  document.getElementById('ropTimes').textContent =
    `Leave ${{dep.toLocaleTimeString([],{{hour:'2-digit',minute:'2-digit'}})}} · Arrive ${{arr.toLocaleTimeString([],{{hour:'2-digit',minute:'2-digit'}})}}`;
  document.getElementById('ropDur').textContent = `${{totalMin}} min`;

  // Departure chips
  renderDepartureChips(currentLegs[0].line);

  // Fit map to route
  const routePts = [];
  currentLegs.forEach(leg=>leg.stations.forEach(s=>routePts.push([s.x,s.y])));
  if (routePts.length) {{
    setTimeout(()=>{{ ropEngine.resize(); ropEngine.fitToContent(routePts, 40); }}, 50);
  }}
  ropEngine.render();

  // Build stop list
  await buildRopBody(currentLegs, dep.getTime(), data.totalSeconds);

  document.getElementById('ropPanel').classList.add('open');
  miniEngine.render();
}}

function renderDepartureChips(line) {{
  const chips = document.getElementById('ropChips');
  const freq = line.frequency || '';
  const m = freq.match(/(\\d+)/);
  const freqMin = m ? parseInt(m[1]) : 15;

  const liveVehicle = allVehicles.find(v=>v.line_id===line.id && v.next_x!=null);
  const liveEta = liveVehicle
    ? etaMinutesFromSpeed(Math.hypot(liveVehicle.next_x-liveVehicle.x, liveVehicle.next_y-liveVehicle.y), liveVehicle.speed_kmh)
    : null;

  const departures = [];
  if (liveEta != null) {{
    departures.push({{ mins: liveEta, isLive: true }});
    departures.push({{ mins: liveEta + freqMin, isLive: false }});
    departures.push({{ mins: liveEta + freqMin*2, isLive: false }});
  }} else {{
    departures.push({{ mins: Math.floor(freqMin/2), isLive: false }});
    departures.push({{ mins: freqMin, isLive: false }});
    departures.push({{ mins: freqMin*2, isLive: false }});
  }}

  const now = new Date();
  chips.innerHTML = departures.map((d,i) => {{
    const depTime = new Date(now.getTime()+d.mins*60000);
    const timeStr = depTime.toLocaleTimeString([],{{hour:'2-digit',minute:'2-digit'}});
    return `<div class="dep-chip ${{d.isLive?'live':''}}">
      ${{d.isLive ? '<div class="dep-chip-label">Live</div>' : ''}}
      <div class="dep-chip-num">${{d.mins}}</div>
      <div class="dep-chip-unit">min</div>
      ${{!d.isLive ? '<div class="dep-chip-badge">Sched</div>' : ''}}
    </div>`;
  }}).join('');
}}

async function buildRopBody(legs, depTimeMs, totalSeconds) {{
  const body = document.getElementById('ropBody');
  let html = '';
  let runningMs = depTimeMs;

  legs.forEach((leg, li) => {{
    const perHopSec = leg.stations.length > 1 ? leg.seconds/(leg.stations.length-1) : leg.seconds;

    if (li > 0) {{
      html += `<div class="transfer-banner">
        <span style="font-size:1.2rem">🔄</span>
        <div>
          <div class="transfer-label">Transfer</div>
          <div class="transfer-detail">Board <strong>${{leg.line.id}}</strong> — ${{escapeHtml(leg.line.name)}} at ${{escapeHtml(leg.stations[0].name)}}</div>
        </div>
      </div>`;
    }}

    html += `<div class="rop-leg">
      <div class="rop-leg-header">
        <div class="rop-leg-badge" style="background:${{leg.line.color}};color:${{leg.line.text_color}}">${{leg.line.id}}</div>
        <div>
          <div class="rop-leg-name">${{escapeHtml(leg.line.name)}}</div>
          <div class="rop-leg-toward">→ ${{escapeHtml(leg.stations[leg.stations.length-1].name)}}</div>
        </div>
        <div class="rop-leg-time">
          <div class="rop-leg-time-lbl">Depart</div>
          <div class="rop-leg-time-val">${{new Date(runningMs).toLocaleTimeString([],{{hour:'2-digit',minute:'2-digit'}})}}</div>
        </div>
      </div>`;

    // Stop rows: show first, collapse middle (>2 stops), show last
    const stops = leg.stations;
    if (stops.length <= 3) {{
      stops.forEach((s,si) => {{
        const t = new Date(runningMs + si*perHopSec*1000);
        const isFirst = si===0, isLast = si===stops.length-1;
        html += stopRow(s.name, t.toLocaleTimeString([],{{hour:'2-digit',minute:'2-digit'}}), isFirst||isLast, leg.line.color);
      }});
    }} else {{
      // First stop
      html += stopRow(stops[0].name, new Date(runningMs).toLocaleTimeString([],{{hour:'2-digit',minute:'2-digit'}}), true, leg.line.color);
      // Collapsed middle
      html += `<div class="stops-collapsed">+ ${{stops.length-2}} stop${{stops.length-2!==1?'s':''}} in between</div>`;
      // Last stop
      const arrMs = runningMs + leg.seconds*1000;
      html += stopRow(stops[stops.length-1].name, new Date(arrMs).toLocaleTimeString([],{{hour:'2-digit',minute:'2-digit'}}), true, leg.line.color);
    }}

    html += '</div>';
    runningMs += leg.seconds * 1000;
  }});

  // Fetch advisories for the lines used
  try {{
    const lineId = legs[0].line.id;
    const advisories = await apiFetch(`/api/advisories?line_id=${{lineId}}`);
    if (advisories.length) {{
      html += `<div style="padding:.5rem 0 0">`;
      html += advisories.map(a => {{
        const icon = a.severity==='alert'?'🔴':a.severity==='warning'?'⚠️':'ℹ️';
        const bg   = a.severity==='alert'?'#FEF2F2':a.severity==='warning'?'#FFFBEB':'#EFF6FF';
        const bc   = a.severity==='alert'?'#FECACA':a.severity==='warning'?'#FDE68A':'#BFDBFE';
        return `<div class="advisory-card" style="background:${{bg}};border-color:${{bc}}">
          <div class="advisory-title">${{icon}} ${{escapeHtml(a.title)}}</div>
          <div class="advisory-body">${{escapeHtml(a.body)}}</div>
          ${{a.source ? `<div class="advisory-meta">Source: ${{escapeHtml(a.source)}}</div>` : ''}}
          <div class="advisory-meta">Posted ${{new Date(a.posted_at).toLocaleDateString()}}</div>
        </div>`;
      }}).join('');
      html += '</div>';
    }}
  }} catch {{}}

  // Save button
  html += `<div style="padding:1rem">
    <button onclick="saveCurrentJourney()" style="width:100%;padding:.8rem;border-radius:var(--r-xs);border:2px solid var(--black);background:none;font-size:.9rem;font-weight:700;font-family:inherit">💾 Save this journey</button>
  </div>`;

  body.innerHTML = html;
}}

function stopRow(name, time, major, lineColor) {{
  return `<div class="stop-row">
    <div class="stop-dot-col" style="color:${{lineColor}}">
      <div class="stop-dot ${{major?'major':''}}"></div>
      <div class="stop-seg" style="background:${{lineColor}}"></div>
    </div>
    <div class="stop-name ${{major?'major':''}}">${{escapeHtml(name)}}</div>
    <div class="stop-time">${{time}}</div>
  </div>`;
}}

function closeRouteOverview() {{
  document.getElementById('ropPanel').classList.remove('open');
  currentLegs = null;
  miniEngine.render();
}}

// ── SCREEN 3: ACTIVE NAVIGATION ───────────────────────────
function startNavigation() {{
  if (!currentLegs) return;
  navStepIndex = 0;
  buildNavSteps();
  document.getElementById('navPanel').classList.add('open');
}}

function buildNavSteps() {{
  const legs = currentLegs;
  const now = new Date();
  let runningMs = now.getTime() + 3*60000;
  const steps = [];

  legs.forEach((leg, li) => {{
    const perHopSec = leg.stations.length>1 ? leg.seconds/(leg.stations.length-1) : leg.seconds;
    // Each leg is one step — show as an arrival-style card
    const liveVehicle = allVehicles.find(v=>v.line_id===leg.line.id && v.next_x!=null);
    let eta = null;
    if (liveVehicle) {{
      const dist = Math.hypot(liveVehicle.next_x-liveVehicle.x, liveVehicle.next_y-liveVehicle.y);
      eta = etaMinutesFromSpeed(dist, liveVehicle.speed_kmh);
    }}
    steps.push({{
      leg, runningMs,
      eta,
      isTransfer: li>0,
      depTime: new Date(runningMs).toLocaleTimeString([],{{hour:'2-digit',minute:'2-digit'}})
    }});
    runningMs += leg.seconds * 1000;
  }});

  steps.push({{ isEnd: true, name: currentLegs[currentLegs.length-1].stations[currentLegs[currentLegs.length-1].stations.length-1].name }});

  // Store steps on window for navigation
  window._navSteps = steps;
  renderNavStep();
}}

function renderNavStep() {{
  const steps = window._navSteps;
  const step = steps[navStepIndex];
  const nav = document.getElementById('navSteps');
  const header = document.getElementById('navHeader');

  if (step.isEnd) {{
    header.style.background = '#059669';
    document.getElementById('navTitle').textContent = 'You\'ve arrived!';
    document.getElementById('navSubtitle').textContent = escapeHtml(step.name);
    nav.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1.5rem;text-align:center;gap:1rem">
      <div style="font-size:3.5rem">🏁</div>
      <div style="font-size:1.3rem;font-weight:800;color:var(--black)">${{escapeHtml(step.name)}}</div>
      <div style="font-size:.9rem;color:var(--gray)">Journey complete</div>
    </div>`;
    document.getElementById('stepNext').textContent = 'End ✓';
    document.getElementById('stepNext').classList.add('end');
  }} else {{
    const leg = step.leg;
    const line = leg.line;
    header.style.background = line.color;
    header.style.color = line.text_color;
    document.getElementById('navTitle').textContent = `Board ${{line.id}} — ${{escapeHtml(line.name)}}`;
    document.getElementById('navSubtitle').textContent = `→ ${{escapeHtml(leg.stations[leg.stations.length-1].name)}}`;
    document.getElementById('stepNext').classList.remove('end');
    document.getElementById('stepNext').textContent = navStepIndex < steps.length-1 ? 'Next →' : 'Arrive ✓';

    // Show as arrival card (like index.html homepage style)
    nav.innerHTML = `
      <div class="nav-step-card" style="background:${{line.color}};color:${{line.text_color}}">
        <div class="nav-step-badge">${{line.id}}</div>
        <div class="nav-step-main">
          <div class="nav-step-title">${{escapeHtml(leg.stations[0].name)}}</div>
          <div class="nav-step-sub">→ ${{escapeHtml(leg.stations[leg.stations.length-1].name)}}</div>
        </div>
        <div class="nav-step-eta">
          <div class="nav-step-num">${{step.eta ?? '—'}}</div>
          <div class="nav-step-unit">${{step.eta ? 'min' : ''}}</div>
        </div>
      </div>
      <div style="padding:1rem">
        <div style="font-size:.7rem;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.65rem">Stops on this leg</div>
        ${{leg.stations.map((s,i) => {{
          const isFirst=i===0, isLast=i===leg.stations.length-1;
          return `<div style="display:flex;align-items:center;gap:.75rem;padding:.4rem 0;border-bottom:1px solid var(--gray-light)">
            <div style="width:10px;height:10px;border-radius:50%;flex-shrink:0;
                        background:${{isFirst||isLast?line.color:'var(--border)'}};
                        border:2px solid ${{line.color}}"></div>
            <div style="font-size:.9rem;font-weight:${{isFirst||isLast?800:400}};color:${{isFirst||isLast?'var(--black)':'var(--gray)'}}">
              ${{escapeHtml(s.name)}}
            </div>
          </div>`;
        }}).join('')}}
      </div>
      ${{step.isTransfer ? `<div class="transfer-banner"><span>🔄</span><div><div class="transfer-label">Transfer at this station</div></div></div>` : ''}}`;
  }}

  document.getElementById('stepBack').disabled = navStepIndex === 0;
  document.getElementById('stepProgress').textContent = `${{navStepIndex+1}} / ${{steps.length}}`;
}}

function stepNext() {{
  const steps = window._navSteps;
  if (steps[navStepIndex].isEnd) {{ endNavigation(); return; }}
  if (navStepIndex < steps.length-1) {{ navStepIndex++; renderNavStep(); }}
}}
function stepPrev() {{
  if (navStepIndex > 0) {{ navStepIndex--; renderNavStep(); }}
}}
function endNavigation() {{
  document.getElementById('navPanel').classList.remove('open');
}}

// ── SAVE JOURNEY ─────────────────────────────────────────
async function saveCurrentJourney() {{
  if (!Auth.isLoggedIn()) {{ toast('Sign in to save journeys'); toggleLogin(); return; }}
  if (!fromStation||!toStation) return;
  try {{
    await apiFetch('/api/journeys', {{
      method:'POST',
      body:JSON.stringify({{from_station_id:fromStation.id, to_station_id:toStation.id,
        from_name:fromStation.name, to_name:toStation.name}})
    }});
    toast('Journey saved ✓');
  }} catch(e) {{ toast(e.message); }}
}}

loadData();
</script>
