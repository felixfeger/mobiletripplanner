<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Plan a Trip — City Metro</title>
<link rel="stylesheet" href="style.css">
<style>
body {{ overflow:hidden; }}
.planner-wrap {{ margin-top:var(--nav-h);display:flex;flex-direction:column;height:calc(100vh - var(--nav-h)); }}
.results-panel {{ flex:1;overflow-y:auto;background:var(--white); }}
.mini-canvas-wrap {{ height:200px;flex-shrink:0;position:relative;overflow:hidden;background:var(--canvas-bg);touch-action:none; }}
#miniCanvas {{ position:absolute;top:0;left:0;transform-origin:0 0; }}
.detail-panel {{ position:fixed;inset:0;margin-top:var(--nav-h);background:var(--white);z-index:1600;overflow-y:auto;transform:translateX(100%);transition:.3s; }}
.detail-panel.open {{ transform:translateX(0); }}
</style>
</head>
<body>

{nav_login}

<div class="planner-wrap">
  <div class="planner-top">
    <div class="planner-row" onclick="openPicker('from')">
      <div class="planner-dot" style="background:#34D399"></div>
      <span class="ptxt placeholder" id="fromLabel">Choose origin station</span>
    </div>
    <div class="planner-row" onclick="openPicker('to')">
      <div class="planner-dot" style="background:white;border:2px solid rgba(255,255,255,.4)"></div>
      <span class="ptxt placeholder" id="toLabel">Where to?</span>
    </div>
    <button class="swap-btn" onclick="swapStations()" title="Swap">⇅</button>
  </div>

  <div class="mini-canvas-wrap" id="miniWrap">
    <canvas id="miniCanvas"></canvas>
  </div>

  <div class="results-panel" id="resultsPanel">
    <div class="empty" style="padding:2rem">
      <span style="font-size:2rem">🔍</span>
      <span>Choose an origin and destination station to see route options</span>
    </div>
  </div>
</div>

<!-- STATION PICKER MODAL -->
<div class="picker-overlay" id="pickerOverlay">
  <div class="picker-card">
    <div class="picker-search">
      <input type="text" id="pickerSearch" placeholder="Search stations…" oninput="filterPicker(this.value)">
    </div>
    <div class="picker-list" id="pickerList"></div>
  </div>
</div>

<!-- JOURNEY DETAIL -->
<div class="detail-panel" id="detailPanel">
  <div class="jhead" id="jhead">
    <button class="detail-back" onclick="closeDetail()">←</button>
    <div style="height:36px"></div>
    <div class="jhead-times" id="jheadTimes"></div>
    <div><span class="jhead-dur" id="jheadDur"></span></div>
  </div>
  <div style="padding:.75rem 1rem;background:#F8FAFC;border-bottom:1px solid #E5E7EB;">
    <div style="font-size:.7rem;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:.06em">Route</div>
  </div>
  <div class="timeline" id="timeline"></div>
  <div style="padding:1rem">
    <button onclick="saveCurrentJourney()" style="width:100%;padding:.8rem;border-radius:var(--r-xs);border:2px solid var(--black);background:none;font-size:.9rem;font-weight:700;">💾 Save this journey</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
setActiveNav('planner');
initLoginForms();

let allStations = [], allLines = {{}}, allSegments = [];
let fromStation = null, toStation = null;
let pickerTarget = 'to';
let currentLegs = null;

const mini = new CanvasEngine('miniWrap','miniCanvas', {{
  scale: .4, minScale:.1, maxScale:3, worldW:3000, worldH:3000, gridSize:100,
  onDraw: drawMini
}});

function drawMini(ctx) {{
  allSegments.forEach(seg => {{
    const line = allLines[seg.line_id];
    if (!line) return;
    const pts = JSON.parse(seg.points_json);
    if (pts.length<2) return;
    ctx.strokeStyle = line.color; ctx.lineWidth = line.type==='rail'?5:3.5;
    ctx.lineCap='round';ctx.lineJoin='round';ctx.globalAlpha=.85;
    ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
    pts.slice(1).forEach(p=>ctx.lineTo(p[0],p[1]));
    ctx.stroke(); ctx.globalAlpha=1;
  }});
  allStations.forEach(s => {{
    const isSel = (fromStation && s.id===fromStation.id) || (toStation && s.id===toStation.id);
    ctx.beginPath();
    ctx.arc(s.x,s.y, isSel?12:6, 0, Math.PI*2);
    ctx.fillStyle = isSel ? (fromStation && s.id===fromStation.id ? '#34D399' : '#1D4ED8') : '#9CA3AF';
    ctx.fill();
    ctx.strokeStyle='white'; ctx.lineWidth=2.5; ctx.stroke();
  }});
}}

// ── LOAD DATA ─────────────────────────────────────────
async function loadData() {{
  try {{
    const [lines, stations] = await Promise.all([apiFetch('/api/lines'), apiFetch('/api/stations')]);
    allLines = {{}}; lines.forEach(l=>allLines[l.id]=l);
    allStations = stations;
    allSegments = [];
    for (const line of lines) {{
      try {{ const d = await apiFetch(`/api/lines/${{encodeURIComponent(line.id)}}`); allSegments.push(...d.segments); }} catch {{}}
    }}
    mini.render();
    if (allStations.length) mini.fitToContent(allStations.map(s=>[s.x,s.y]));

    handleUrlParams();
  }} catch {{}}
}}

function handleUrlParams() {{
  const pending = sessionStorage.getItem('pendingJourney');
  if (pending) {{
    sessionStorage.removeItem('pendingJourney');
    const j = JSON.parse(pending);
    applyJourney(j.from_station_id, j.to_station_id);
  }}
}}

// ── STATION PICKER ────────────────────────────────────
function openPicker(target) {{
  pickerTarget = target;
  document.getElementById('pickerOverlay').classList.add('open');
  document.getElementById('pickerSearch').value = '';
  renderPickerList(allStations);
  setTimeout(()=>document.getElementById('pickerSearch').focus(), 80);
}}

function filterPicker(q) {{
  q = q.toLowerCase();
  renderPickerList(allStations.filter(s => s.name.toLowerCase().includes(q)));
}}

function renderPickerList(stations) {{
  const list = document.getElementById('pickerList');
  if (!stations.length) {{ list.innerHTML = '<div class="empty" style="padding:1.5rem">No stations found.</div>'; return; }}
  list.innerHTML = stations.map(s => {{
    const lineIds = (s.line_ids||'').split(',').filter(Boolean);
    const chips = lineIds.map(id => {{
      const l = allLines[id]; if (!l) return '';
      return `<span class="chip-sm" style="background:${{l.color}};color:${{l.text_color}}">${{l.id}}</span>`;
    }}).join(' ');
    return `
      <div class="picker-item" onclick='selectPickerStation(${{s.id}})'>
        <span class="picker-item-icon">${{s.type==='hub'?'🔀':s.type==='station'?'🚆':'🚌'}}</span>
        <div style="flex:1">
          <div style="font-weight:700;font-size:.9rem">${{s.name}}</div>
          <div style="display:flex;gap:4px;margin-top:3px">${{chips}}</div>
        </div>
      </div>`;
  }}).join('');
}}

function selectPickerStation(id) {{
  const s = allStations.find(x => x.id === id);
  if (!s) return;
  if (pickerTarget === 'from') {{
    fromStation = s;
    document.getElementById('fromLabel').textContent = s.name;
    document.getElementById('fromLabel').classList.remove('placeholder');
  }} else {{
    toStation = s;
    document.getElementById('toLabel').textContent = s.name;
    document.getElementById('toLabel').classList.remove('placeholder');
  }}
  document.getElementById('pickerOverlay').classList.remove('open');
  mini.render();
  if (fromStation && toStation) planTrip();
}}

document.getElementById('pickerOverlay').addEventListener('click', e => {{
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
}});

function swapStations() {{
  [fromStation,toStation] = [toStation,fromStation];
  document.getElementById('fromLabel').textContent = fromStation ? fromStation.name : 'Choose origin station';
  document.getElementById('fromLabel').classList.toggle('placeholder', !fromStation);
  document.getElementById('toLabel').textContent = toStation ? toStation.name : 'Where to?';
  document.getElementById('toLabel').classList.toggle('placeholder', !toStation);
  mini.render();
  if (fromStation && toStation) planTrip();
}}

function applyJourney(fromId, toId) {{
  const f = allStations.find(s=>s.id===fromId), t = allStations.find(s=>s.id===toId);
  if (f) {{ fromStation=f; document.getElementById('fromLabel').textContent=f.name; document.getElementById('fromLabel').classList.remove('placeholder'); }}
  if (t) {{ toStation=t; document.getElementById('toLabel').textContent=t.name; document.getElementById('toLabel').classList.remove('placeholder'); }}
  mini.render();
  if (fromStation && toStation) planTrip();
}}

window.addEventListener('loadJourney', e => applyJourney(e.detail.from_station_id, e.detail.to_station_id));

// ── PLAN TRIP (graph routing) ─────────────────────────
async function planTrip() {{
  const panel = document.getElementById('resultsPanel');
  panel.innerHTML = '<div class="empty"><div class="spinner"></div><span>Finding routes…</span></div>';
  try {{
    const data = await apiFetch(`/api/plan?from_station=${{fromStation.id}}&to_station=${{toStation.id}}`);
    if (!data.found || !data.legs.length) {{
      panel.innerHTML = '<div class="empty"><span style="font-size:1.5rem">😕</span><span>No connected route found between these stations.<br><small>Try the Editor to connect lines.</small></span></div>';
      return;
    }}
    currentLegs = data.legs;
    renderRouteOption(data);
  }} catch(e) {{
    panel.innerHTML = `<div class="empty">⚠️ ${{e.message}}</div>`;
  }}
}}

function renderRouteOption(data) {{
  const panel = document.getElementById('resultsPanel');
  const legs = data.legs;
  const totalMin = Math.max(1, Math.round(data.totalSeconds/60));
  const chips = legs.map((leg,i) => `
    <span class="chip" style="background:${{leg.line.color}};color:${{leg.line.text_color}}">${{leg.line.id}}</span>
    ${{i<legs.length-1 ? '<span class="route-transfer-arrow">→</span>' : ''}}
  `).join('');

  panel.innerHTML = `
    <div style="padding:.85rem 1rem;border-bottom:1px solid #E5E7EB">
      <div style="font-size:.7rem;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:.06em">Best route</div>
    </div>
    <div class="route-opt" onclick="showDetail()">
      <div style="width:52px;height:52px;border-radius:12px;background:${{legs[0].line.color}};display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:900;color:${{legs[0].line.text_color}};flex-shrink:0">${{legs[0].line.id}}</div>
      <div class="route-opt-left">
        <div class="route-chips">${{chips}}</div>
        <div style="font-size:.85rem;font-weight:700">${{data.transfers===0?'Direct route':data.transfers+' transfer'+(data.transfers>1?'s':'')}}</div>
        <div style="font-size:.78rem;color:var(--gray);margin-top:2px">${{fromStation.name}} → ${{toStation.name}}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:1.6rem;font-weight:900;color:var(--black);line-height:1">${{totalMin}}</div>
        <div style="font-size:.72rem;color:var(--gray);font-weight:600">min</div>
      </div>
    </div>
  `;
}}

// ── DETAIL PANEL ──────────────────────────────────────
function showDetail() {{
  if (!currentLegs) return;
  const legs = currentLegs;
  const firstLine = legs[0].line;
  const jhead = document.getElementById('jhead');
  jhead.style.background = firstLine.color;
  jhead.style.color = firstLine.text_color;

  const now = new Date();
  const totalSeconds = legs.reduce((a,l)=>a+l.seconds,0);
  const dep = new Date(now.getTime()+3*60000);
  const arr = new Date(dep.getTime()+totalSeconds*1000);
  document.getElementById('jheadTimes').textContent =
    `Leave ${{dep.toLocaleTimeString([],{{hour:'2-digit',minute:'2-digit'}})}} · Arrive ${{arr.toLocaleTimeString([],{{hour:'2-digit',minute:'2-digit'}})}}`;
  document.getElementById('jheadDur').textContent = `${{Math.round(totalSeconds/60)}} min`;

  const tl = document.getElementById('timeline');
  let html = '';
  let runningTime = dep.getTime();

  legs.forEach((leg, li) => {{
    if (li > 0) {{
      html += `<div style="padding:.4rem 0"><span class="transfer-tag">🔄 Transfer to ${{leg.line.id}} — ${{leg.line.name}}</span></div>`;
    }}
    leg.stations.forEach((st, si) => {{
      const isEnd = si === 0 || si === leg.stations.length-1;
      const t = new Date(runningTime);
      html += timelineRow(st.name, t.toLocaleTimeString([],{{hour:'2-digit',minute:'2-digit'}}), isEnd, leg.line.color, isEnd);
      if (si < leg.stations.length-1) runningTime += (leg.seconds/(leg.stations.length-1))*1000;
    }});
  }});

  tl.innerHTML = html;
  document.getElementById('detailPanel').classList.add('open');
}}

function timelineRow(name, time, major, color, filled) {{
  return `<div class="tl-row">
    <div class="tl-dots">
      <div class="tl-dot${{filled?' filled':''}}" style="border-color:${{color}};${{filled?'background:'+color:''}}"></div>
      <div class="tl-seg" style="background:${{color}}"></div>
    </div>
    <div class="tl-name${{major?' bold':''}}">${{name}}</div>
    <div class="tl-time">${{time}}</div>
  </div>`;
}}

function closeDetail() {{ document.getElementById('detailPanel').classList.remove('open'); }}

// ── SAVE JOURNEY ──────────────────────────────────────
async function saveCurrentJourney() {{
  if (!Auth.isLoggedIn()) {{ toast('Sign in to save journeys'); toggleLogin(); return; }}
  if (!fromStation||!toStation) return;
  try {{
    await apiFetch('/api/journeys', {{ method:'POST', body: JSON.stringify({{
      from_station_id: fromStation.id, to_station_id: toStation.id,
      from_name: fromStation.name, to_name: toStation.name
    }})}});
    toast('Journey saved ✓');
  }} catch(e) {{ toast(e.message); }}
}}

const urlLine = new URLSearchParams(location.search).get('line');

loadData();
</script>
</body>
</html>
